<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta http-equiv=Content-Type content="text/html; charset=UTF-8">
<meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name=theme-color content=#1a1a2e>
<link rel=manifest href=manifest.json>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<link rel=apple-touch-icon href=icon-192.png>
<title>JLPT Grammar Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Helvetica Neue,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px 16px;border-bottom:1px solid #2a2a4a}
.hdr h1{font-size:22px;font-weight:700;color:#e94560}.hdr p{font-size:13px;color:#8888aa;margin-top:4px}
.tb{display:flex;background:#1a1a2e;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10}
.tb button{flex:1;padding:12px;background:none;border:none;color:#666688;font-size:15px;font-weight:600;cursor:pointer}.tb button.act{color:#e94560;border-bottom:3px solid #e94560}
.ct{padding:16px;max-width:800px;margin:0 auto}
.lg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.lg button{padding:20px;border-radius:12px;border:2px solid #2a2a4a;background:#1a1a2e;color:#ccc;font-size:20px;font-weight:700;cursor:pointer}
.lg button.act{border-color:#e94560;background:rgba(233,69,96,0.15);color:#e94560}.lg button small{display:block;font-size:11px;font-weight:400;color:#8888aa;margin-top:4px}
.gs input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;margin-bottom:8px}
.gs summary{cursor:pointer;color:#e94560;font-weight:600;font-size:14px;padding:8px 0}
.gc{max-height:300px;overflow-y:auto;border:1px solid #2a2a4a;border-radius:8px}
.gc label{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #1a1a2e;font-size:13px;cursor:pointer}
.gc input[type=checkbox]{accent-color:#e94560;flex-shrink:0}.cb{padding:2px 6px;border-radius:4px;font-size:11px;background:#2a2a4a;color:#888;margin-left:auto;flex-shrink:0}
.mt{display:flex;background:#1a1a2e;border-radius:10px;overflow:hidden;border:1px solid #2a2a4a;margin-bottom:16px}
.mt button{flex:1;padding:10px;border:none;background:#1a1a2e;color:#8888aa;font-size:14px;font-weight:600;cursor:pointer}.mt button.act{background:#e94560;color:#fff}
.ctrls{display:flex;gap:10px;margin-bottom:20px}
.ctrls button{padding:12px 24px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;flex:1;min-width:120px}
.bgen{background:#e94560;color:#fff}.bgen:disabled{background:#553;color:#666}.bclr{background:#2a2a4a;color:#aaa}
.sr{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap}.sr label{font-size:13px;color:#8888aa}.sr select{padding:6px 10px;border-radius:6px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:13px}
.rc{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;padding:20px;margin-bottom:20px}
.rc .m{font-size:11px;color:#666688;margin-bottom:6px}.rc .jp{font-size:20px;line-height:1.6;margin-bottom:8px}
.rc .en{font-size:14px;color:#aaaacc;line-height:1.5;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #2a2a4a}
.rc .st{font-size:12px;color:#8888aa;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:12px}
.rc .vl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rc .vi{background:rgba(255,255,255,0.05);border-radius:6px;padding:6px 10px;font-size:13px}
.rc .vi .kj{font-weight:600;color:#e0e0e0}.rc .vi .kn{color:#8888aa;font-size:11px;margin-left:4px}.rc .vi .me{color:#aaaacc;font-size:11px;margin-left:4px}
.rc .gl{display:flex;flex-wrap:wrap;gap:4px}.rc .gi{background:rgba(233,69,96,0.15);color:#e94560;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600}
.lod{text-align:center;padding:40px;color:#8888aa}.sp{display:inline-block;width:40px;height:40px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hi{padding:12px;border-bottom:1px solid #2a2a4a;font-size:13px;cursor:pointer}.hi .hl{font-weight:600;color:#e94560}.hi .hj{color:#ccc;margin:4px 0}.hi .he{color:#8888aa;font-size:12px}
.es{text-align:center;padding:60px 20px;color:#666688}.es .ic{font-size:48px;margin-bottom:12px}.es h3{font-size:18px;margin-bottom:8px;color:#8888aa}
.gr-level{margin-bottom:24px;border:1px solid #2a2a4a;border-radius:10px;overflow:hidden}
.gr-level summary{cursor:pointer;padding:14px 16px;background:#1a1a2e;font-weight:600;color:#e94560;user-select:none;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
.gr-level summary:hover{background:#16213e}
.gr-level[open]>summary{border-bottom:1px solid #e94560;background:rgba(233,69,96,0.1)}
.gr-level[open]>summary::after{transform:rotate(180deg)}
.gr-level summary::after{content:'⌄';transition:transform .2s}
.gr-group{border-bottom:1px solid #2a2a4a;margin:0}
.gr-group summary{cursor:pointer;padding:10px 20px;background:#0f0f1a;color:#8888aa;font-size:14px;font-weight:600;user-select:none}
.gr-group summary:hover{background:rgba(233,69,96,0.05);color:#aaaacc}
.gr-group[open]>summary{background:rgba(233,69,96,0.1);color:#e0e0e0;border-bottom:1px solid #2a2a4a}
.gr-item{padding:12px 24px;border-bottom:1px solid #0f0f1a;background:#0a0a12}
.gr-item:last-child{border-bottom:none}
.gr-point{font-weight:600;color:#e94560;font-size:14px;margin-bottom:4px}
.gr-explain{font-size:13px;color:#aaaacc;margin-bottom:6px;line-height:1.4}
.gr-sent{font-size:14px;color:#e0e0e0;background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:6px;margin-bottom:4px;line-height:1.5}
.gr-trans{font-size:13px;color:#8888aa;padding-left:10px;border-left:2px solid #2a2a4a}
::-webkit-scrollbar{width:6px}input[type=password]{caret-color:#e94560}
</style>
</head>
<body>
<div class=hdr>
  <h1>JLPT Grammar Practice</h1>
  <p>Generate sentences with DeepSeek AI</p>
</div>
<div class=tb>
  <button class=act data-t=gen>Generate</button>
  <button data-t=ref>Grammar Ref</button>
  <button data-t=hist>History</button>
  <button data-t=set>Settings</button>
</div>
<div class=ct id=tab-gen>
  <div class=lg>
    <button data-l=N5>N5<small>Beginner</small></button>
    <button class=act data-l=N4>N4<small>Elementary</small></button>
    <button data-l=N3>N3<small>Intermediate</small></button>
  </div>
  <div class=mt>
    <button class=act data-md=s>Sentences</button>
    <button data-md=t>Short Text</button>
  </div>
  <details class=gs>
    <summary>Choose specific grammar (optional)</summary>
    <input id=gs placeholder=Search><div class=gc id=gc></div>
  </details>
  <div class=sr>
    <label>Count: <select id=cnt><option value=3>3</option><option value=5 selected>5</option><option value=8>8</option><option value=10>10</option></select></label>
    <label>EN: <input type=checkbox id=trans checked></label>
    <label>Target Vocab: <select id=vl><option value=3 selected>3</option><option value=4>4</option><option value=5>5</option></select></label>
    <label>Story Length: <select id=stl><option value=10>10 sentences</option><option value=15 selected>15 sentences</option><option value=20>20 sentences</option></select></label>
  </div>
  <div class=ctrls>
    <button class=bgen id=gen>Generate</button>
    <button class=bclr id=clr>Clear</button>
  </div>
  <div id=res></div>
</div>
<div class=ct id=tab-ref style=display:none>
  <h2 style="margin-bottom:20px;color:#e94560">Grammar Reference</h2>
  <div id=gr-content></div>
</div>
<div class=ct id=tab-hist style=display:none>
  <div id=hl><div class=es><div class=ic>&#128203;</div><h3>No history yet</h3></div></div>
  <button class=bclr id=clh style="width:100%;margin-top:12px;padding:10px;border-radius:8px;border:none;cursor:pointer">Clear History</button>
</div>
<div class=ct id=tab-set style=display:none>
  <h3 style="margin-bottom:16px">Settings</h3>
  <p>DeepSeek API Key<br><input type=password id=key placeholder="sk-..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"></p>
  <p style=margin-top:12px>Model<br><select id=mdl style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"><option value=deepseek-chat>deepseek-chat</option></select></p>
  <p style=margin-top:12px>Temperature: <span id=tv>1.0</span><br><input type=range id=tr min=0.1 max=1.5 step=0.1 value=1.0 style="width:100%;accent-color:#e94560"></p>
  <button id=svs style="padding:10px 24px;border-radius:8px;border:none;background:#e94560;color:#fff;font-weight:600;cursor:pointer">Save</button>
</div>
<script>
var G={{GRAMMAR_JSON}};
var V={{VOCAB_JSON}};
var T={{TOPICS_JSON}};
var SK='jga4';
var S=JSON.parse(localStorage.getItem(SK+'_s')||'{}');
if(!S.apiKey)S={apiKey:'',model:'deepseek-chat',temperature:1.0};
var H=JSON.parse(localStorage.getItem(SK+'_h')||'[]');
var curMode='s';
function sH(){localStorage.setItem(SK+'_h',JSON.stringify(H.slice(0,200)))}
function sh(a){for(var i=a.length-1;i>0;i--){var j=Math.random()*(i+1)|0;var t=a[i];a[i]=a[j];a[j]=t}return a}
function pr(a,n){var s=sh([].concat(a));return s.slice(0,Math.min(n,s.length))}
function gV(l){var m={N3:['N3','N4','N5'],N4:['N4','N5'],N5:['N5']};var n=m[l]||[];return V.filter(function(v){var t=(v.tags||'').toUpperCase();for(var i=0;i<n.length;i++){if(t.indexOf('JLPT_'+n[i])>-1)return true}return false})}
function gG(l){return G.filter(function(g){return g.jlpt_level===l})}
function gT(l){var level='n'+l.toLowerCase().replace('n','');return T[level]||{}}
function pickTopic(l){var topics=gT(l);var keys=Object.keys(topics);if(!keys.length)return null;var rkey=keys[Math.floor(Math.random()*keys.length)];return {name:rkey,vocabs:topics[rkey]}}
function pickTopicVocabs(topicVocabs,count){if(!topicVocabs||!topicVocabs.length)return[];var selected=sh([].concat(topicVocabs));return selected.slice(0,Math.min(count||4,selected.length))}
function bP(l,sl,c,tr,mode,storyLen){var p=sl.length>0?sl:pr(gG(l),c);var gd=p.map(function(g){return g.grammar_point}).join('\n- ');if(mode==='t'){var vc=parseInt(document.getElementById('vl').value)||3;var topic=pickTopic(l);var tvocabs=topic?pickTopicVocabs(topic.vocabs,vc):[];var topicDesc=topic?'about '+topic.name.replace(/_/g,' '):'with natural vocabulary';var vocabList=tvocabs.length?'- '+tvocabs.join('\n- '):'(Choose naturally fitting vocabulary)';var levelDesc='mostly '+l+' vocabulary and grammar, avoiding difficult kanji and advanced literary expressions';var t='Write a coherent short story for JLPT '+l+' learners in approximately '+storyLen+' sentences about a simple everyday scenario '+topicDesc+'.\n\n';t+='Requirements:\n- Use '+levelDesc+'\n- Avoid difficult kanji and advanced literary expressions\n- Keep sentences natural and conversational\n- Use these grammar patterns: '+gd+'\n- Include these target words naturally: '+vocabList+'\n\n';t+='Output exactly this JSON format (no other text):\n{\n  "text": "The Japanese story here ('+storyLen+' sentences)",\n  "translation": "English translation of the story",\n  "vocab": [{word: "kanji word", reading: "hiragana reading", meaning: "English meaning"}],\n  "grammars": ["grammar1", "grammar2"]\n}\n\nIMPORTANT:\n- The vocab array must include EVERY word containing kanji from your text, not just the target words. Include all verbs, nouns, adjectives, and adverbs that use kanji.\n- Each vocab item MUST use exactly these keys: word, reading, meaning.\n- The "word" field must contain the kanji form as it appears in the text.\n- Example: {"word": "食べる", "reading": "たべる", "meaning": "to eat"}';return t}else{var t='You are a Japanese teacher creating '+c+' natural Japanese sentences for JLPT '+l+'.\n\n';t+='Use these grammar points:\n'+gd+'\n\n';t+='Requirements: Each sentence uses exactly one grammar point. Natural, conversational Japanese.\n\n';t+='Output exactly this JSON format (no other text, no markdown, no explanations):\n[\n  {sentence: "Japanese sentence", translation: "English", grammar: "grammar name", vocab: [{all kanji words in this sentence}]}\n]\n\n';t+='vocab items format: {"word": "kanji form", "reading": "hiragana", "meaning": "English"}\nInclude ALL kanji-containing words from each sentence in its vocab array, not just difficult ones.\nExample: {"word": "食べる", "reading": "たべる", "meaning": "to eat"}';return t}}
async function cA(p){var k=S.apiKey;if(!k||k==='sk-...')throw new Error('Set API key in Settings');var r=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:S.model||'deepseek-chat',messages:[{role:'system',content:'You are a Japanese teacher. Respond with valid JSON only. Do not add any extra text, explanations, or notes.'},{role:'user',content:p}],temperature:S.temperature||1.0,max_tokens:12000})});if(!r.ok){var e=await r.text();throw new Error('Error '+r.status+': '+e)}var d=await r.json();var c=d.choices[0].message.content;if(!c)throw new Error('Empty');c=c.replace(/`json?/gi,'').replace(/`/g,'').trim();c=c.replace(/^\ufeff/g,'').replace(/\ufeff/g,'').replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');var resSnippet=c.substring(0,300);
function balancedExtract(s){var start=-1,openChar='',closeChar='';for(var i=0;i<s.length;i++){var ch=s[i];if(ch==='{'||ch==='['){start=i;openChar=ch;closeChar=(ch==='{'?'}':']');break}}if(start<0)return null;var depth=0,inStr=false,esc=false;for(var j=start;j<s.length;j++){var ch2=s[j];if(inStr){if(esc)esc=false;else if(ch2==='\\')esc=true;else if(ch2==='"')inStr=false;continue}else{if(ch2==='"'){inStr=true;continue}if(ch2===openChar)depth++;else if(ch2===closeChar){depth--;if(depth===0)return s.substring(start,j+1)}}}return null}
function stripWs(s){return s.replace(/^[\s\uFEFF]+|[\s\uFEFF]+$/g,'')}
function tryParse(jsonStr){jsonStr=stripWs(jsonStr);return JSON.parse(jsonStr)}
try{var m=balancedExtract(c);if(m)return tryParse(m);var a=c.match(/\[[\s\S]*\]/);if(a)return tryParse(a[0]);var b=c.match(/\{[\s\S]*\}/);if(b)return tryParse(b[0]);return tryParse(c)}catch(e2){
try{let lastJson=c.replace(/^[\s\uFEFF]+/,'');if(lastJson){for(let i=c.length-1;i>=0;i--){if(c[i]==='}'||c[i]===']'){let jsonStr=c.substring(0,i+1);try{return tryParse(jsonStr)}catch(e3){}}}}}catch(e4){}
throw new Error('Could not extract valid JSON from response. Snippet: '+resSnippet)}}
function rV(v){if(!v)return '';var word=String(v.word||v.kanji||v.expression||'');var reading=String(v.reading||v.kana||'');var meaning=String(v.meaning||v.english||v.translation||'');if(reading==='undefined')reading='';if(meaning==='undefined')meaning='';return '<span class=vi><span class=kj>'+word+'</span><span class=kn>'+reading+'</span><span class=me>'+meaning+'</span></span>'}
function rS(r){var d=document.getElementById('res');var h='';if(!Array.isArray(r)){h+='<div class=rc><div class=m>Story</div><div class=jp>'+(r.text||'').replace(/\n/g,'<br>')+'</div>';if(r.translation)h+='<div class=en>'+r.translation.replace(/\n/g,'<br>')+'</div>';if(r.vocab&&r.vocab.length){h+='<div class=st>Vocabulary</div><div class=vl>';r.vocab.forEach(function(v){h+=rV(v)});h+='</div>'}if(r.grammars&&r.grammars.length){h+='<div class=st>Grammar</div><div class=gl>';r.grammars.forEach(function(g){h+='<span class=gi>'+g+'</span>'});h+='</div>'}h+='</div>'}else{r.forEach(function(s){h+='<div class=rc><div class=jp>'+(s.sentence||'')+'</div>';if(s.translation)h+='<div class=en>'+s.translation+'</div>';if(s.vocab&&s.vocab.length){h+='<div class=st>Vocabulary</div><div class=vl>';s.vocab.forEach(function(v){h+=rV(v)});h+='</div>'}if(s.grammar){h+='<div class=st>Grammar</div><div class=gl><span class=gi>'+s.grammar+'</span></div>'}h+='</div>'})}d.innerHTML=h}
async function gen(){var b=document.getElementById('gen');var al=document.querySelector('.lg .act');if(!al)return;var l=al.getAttribute('data-l');var ck=document.querySelectorAll('#gc input:checked');var sl=[];ck.forEach(function(c){var f=G.find(function(g){return g.id===parseInt(c.value)});if(f)sl.push(f)});var c=parseInt(document.getElementById('cnt').value);var tr=document.getElementById('trans').checked;var stl=parseInt(document.getElementById('stl').value)||15;var md=curMode;b.disabled=true;b.textContent='...';document.getElementById('res').innerHTML='<div class=lod><div class=sp></div><p>Generating...</p></div>';try{var p=bP(l,sl,c,tr,md,stl);var r=await cA(p);rS(r);var hr=md==='t'?[{sentence:r.text||'',translation:r.translation||'',grammar:(r.grammars||[]).join(', '),vocab:r.vocab||[]}]:(Array.isArray(r)?r.slice(0,10):[r]);H.push({timestamp:new Date().toISOString(),level:l,mode:md,count:md==='t'?1:r.length,grammarCount:sl.length||'random',results:hr});sH()}catch(e){document.getElementById('res').innerHTML='<div class=rc style=border-color:#e94560><div class=m>Error</div><div style=color:#e94560>'+e.message+'</div></div>'}finally{b.disabled=false;b.textContent='Generate'}}
function bGC(l){var c=document.getElementById('gc');c.innerHTML=gG(l).map(function(g){return '<label><input type=checkbox value='+g.id+'><span>'+g.grammar_point+'</span><span class=cb>'+g.sentence.length+'</span></label>'}).join('')}
function rGR(){var cont=document.getElementById('gr-content');var levs=['N5','N4','N3'];var html='';levs.forEach(function(lv){var lvGrams=gG(lv);if(!lvGrams.length)return;html+='<details class=gr-level><summary>'+lv+' ('+lvGrams.length+' points)</summary>';for(var i=0;i<lvGrams.length;i+=10){var grp=lvGrams.slice(i,i+10);var grpNum=Math.floor(i/10)+1;html+='<details class=gr-group><summary>Group '+grpNum+' (items '+(i+1)+'-'+(i+grp.length)+')</summary>';grp.forEach(function(g){html+='<div class=gr-item><div class=gr-point>'+g.grammar_point+'</div>';if(g.short_explanation)html+='<div class=gr-explain>'+g.short_explanation+'</div>';if(g.sentence)html+='<div class=gr-sent>'+g.sentence+'</div>';if(g.translation)html+='<div class=gr-trans>'+g.translation+'</div>';html+='</div>'});html+='</details>'}html+='</details>'});cont.innerHTML=html||'<p style="color:#8888aa">No grammar reference available</p>'}
document.querySelectorAll('.tb button').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tb button').forEach(function(x){x.classList.remove('act')});b.classList.add('act');var t=b.getAttribute('data-t');document.querySelectorAll('.ct').forEach(function(c){c.style.display='none'});document.getElementById('tab-'+t).style.display='block';if(t==='hist')rH();if(t==='ref')rGR();if(t==='set')lSU()})});
document.querySelectorAll('.lg button').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.lg button').forEach(function(x){x.classList.remove('act')});b.classList.add('act');bGC(b.getAttribute('data-l'))})});
document.querySelectorAll('.mt button').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.mt button').forEach(function(x){x.classList.remove('act')});b.classList.add('act');curMode=b.getAttribute('data-md')})});
document.getElementById('gs').addEventListener('input',function(e){var q=e.target.value.toLowerCase();document.querySelectorAll('#gc label').forEach(function(l){l.style.display=l.querySelector('span').textContent.toLowerCase().indexOf(q)>-1?'flex':'none'})});
function rH(){var c=document.getElementById('hl');if(!H.length){c.innerHTML='<div class=es><div class=ic>&#128203;</div><h3>No history yet</h3></div>';return}c.innerHTML=H.slice().reverse().map(function(h,i){var ml=h.mode==='t'?'text':h.count+' sentences';return '<div class=hi onclick=vH('+(H.length-1-i)+')><span class=hl>'+h.level+'</span> '+ml+' '+(h.grammarCount==='random'?'(random)':'('+h.grammarCount+' specific)')+'<div class=hj>'+(h.results[0]?.sentence?.substring(0,50)||'...')+'</div><div class=he>'+new Date(h.timestamp).toLocaleString()+'</div></div>'}).join('')}
function vH(i){var h=H[i];if(!h)return;document.querySelector('[data-t=gen]').click();if(h.results.length===1&&h.results[0].sentence&&h.mode==='t'){rS({text:h.results[0].sentence,translation:h.results[0].translation,grammars:(h.results[0].grammar||'').split(', '),vocab:h.results[0].vocab||[]})}else{rS(h.results)}document.querySelectorAll('.lg button').forEach(function(b){b.classList.remove('act')});var lb=document.querySelector('.lg button[data-l="'+h.level+'"]');if(lb)lb.classList.add('act')}
