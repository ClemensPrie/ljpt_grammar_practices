<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta http-equiv=Content-Type content="text/html; charset=UTF-8">
<meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name=theme-color content=#1a1a2e>
<link rel=manifest href=manifest.json>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<link rel=apple-touch-icon href=icon-192.png>
<title>JLPT Grammar Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Helvetica Neue,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px 16px;border-bottom:1px solid #2a2a4a}
.hdr h1{font-size:22px;font-weight:700;color:#e94560}.hdr p{font-size:13px;color:#8888aa;margin-top:4px}
.tb{display:flex;background:#1a1a2e;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10}
.tb button{flex:1;padding:12px;background:none;border:none;color:#666688;font-size:15px;font-weight:600;cursor:pointer}.tb button.act{color:#e94560;border-bottom:3px solid #e94560}
.ct{padding:16px;max-width:800px;margin:0 auto}
.lg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.lg button{padding:20px;border-radius:12px;border:2px solid #2a2a4a;background:#1a1a2e;color:#ccc;font-size:20px;font-weight:700;cursor:pointer}
.lg button.act{border-color:#e94560;background:rgba(233,69,96,0.15);color:#e94560}.lg button small{display:block;font-size:11px;font-weight:400;color:#8888aa;margin-top:4px}
.gs input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;margin-bottom:8px}
.gs summary{cursor:pointer;color:#e94560;font-weight:600;font-size:14px;padding:8px 0}
.gc{max-height:300px;overflow-y:auto;border:1px solid #2a2a4a;border-radius:8px}
.gc-item{padding:10px 12px;border-bottom:1px solid #1a1a2e;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;-webkit-tap-highlight-color:rgba(233,69,96,0.3);transition:background.15s}
.gc-item:active{background:rgba(255,255,255,0.04)}.gc-item.selected{background:rgba(233,69,96,0.15);color:#e94560;font-weight:600}
.gc-item.selected .cb{background:#e94560;color:#fff}.gc-item .cn{flex:1;min-width:0}.cb{padding:2px 6px;border-radius:4px;font-size:11px;background:#2a2a4a;color:#888;margin-left:auto;flex-shrink:0}
.gc-item .chk{visibility:hidden;font-size:14px;flex-shrink:0}
.gc-item.selected .chk{visibility:visible}
.mt{display:flex;background:#1a1a2e;border-radius:10px;overflow:hidden;border:1px solid #2a2a4a;margin-bottom:16px}
.mt button{flex:1;padding:10px;border:none;background:#1a1a2e;color:#8888aa;font-size:14px;font-weight:600;cursor:pointer}.mt button.act{background:#e94560;color:#fff}
.ctrls{display:flex;gap:10px;margin-bottom:20px}
.ctrls button{padding:12px 24px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;flex:1;min-width:120px}
.bgen{background:#e94560;color:#fff}.bgen:disabled{background:#553;color:#666}.bclr{background:#2a2a4a;color:#aaa}
.sr{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap}.sr label{font-size:13px;color:#8888aa}.sr select{padding:6px 10px;border-radius:6px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:13px}
.rc{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;padding:20px;margin-bottom:20px}
.rc .m{font-size:11px;color:#666688;margin-bottom:6px}.rc .jp{font-size:20px;line-height:1.6;margin-bottom:8px}
.rc .en{font-size:14px;color:#aaaacc;line-height:1.5;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #2a2a4a}
.rc .st{font-size:12px;color:#8888aa;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:12px}
.rc .vl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rc .vi{background:rgba(255,255,255,0.05);border-radius:6px;padding:6px 10px;font-size:13px}
.rc .vi .kj{font-weight:600;color:#e0e0e0}.rc .vi .kn{color:#8888aa;font-size:11px;margin-left:4px}.rc .vi .me{color:#aaaacc;font-size:11px;margin-left:4px}
.rc .gl{display:flex;flex-wrap:wrap;gap:4px}.rc .gi{background:rgba(233,69,96,0.15);color:#e94560;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600}
.usage{font-size:12px;color:#8888aa;background:#10101c;border:1px solid #2a2a4a;border-radius:8px;padding:10px 12px;margin-top:-8px;margin-bottom:20px}
.lod{text-align:center;padding:40px;color:#8888aa}.sp{display:inline-block;width:40px;height:40px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hi{padding:12px;border-bottom:1px solid #2a2a4a;font-size:13px;cursor:pointer}.hi .hl{font-weight:600;color:#e94560}.hi .hj{color:#ccc;margin:4px 0}.hi .he{color:#8888aa;font-size:12px}
.es{text-align:center;padding:60px 20px;color:#666688}.es .ic{font-size:48px;margin-bottom:12px}.es h3{font-size:18px;margin-bottom:8px;color:#8888aa}
.gr-level{margin-bottom:24px;border:1px solid #2a2a4a;border-radius:10px;overflow:hidden}
.gr-level summary{cursor:pointer;padding:14px 16px;background:#1a1a2e;font-weight:600;color:#e94560;user-select:none;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
.gr-level summary:hover{background:#16213e}
.gr-level[open]>summary{border-bottom:1px solid #e94560;background:rgba(233,69,96,0.1)}
.gr-level[open]>summary::after{transform:rotate(180deg)}
.gr-level summary::after{content:'⌄';transition:transform .2s}
.gr-group{border-bottom:1px solid #2a2a4a;margin:0}
.gr-group summary{cursor:pointer;padding:10px 20px;background:#0f0f1a;color:#8888aa;font-size:14px;font-weight:600;user-select:none}
.gr-group summary:hover{background:rgba(233,69,96,0.05);color:#aaaacc}
.gr-group[open]>summary{background:rgba(233,69,96,0.1);color:#e0e0e0;border-bottom:1px solid #2a2a4a}
.gr-item{padding:12px 24px;border-bottom:1px solid #0f0f1a;background:#0a0a12}
.gr-item:last-child{border-bottom:none}
.gr-point{font-weight:600;color:#e94560;font-size:14px;margin-bottom:4px}
.gr-explain{font-size:13px;color:#aaaacc;margin-bottom:6px;line-height:1.4}
.gr-sent{font-size:14px;color:#e0e0e0;background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:6px;margin-bottom:4px;line-height:1.5}
.gr-trans{font-size:13px;color:#8888aa;padding-left:10px;border-left:2px solid #2a2a4a}
::-webkit-scrollbar{width:6px}input[type=password]{caret-color:#e94560}
ruby{ ruby-align:center}rt{font-size:.45em;color:#e94560;user-select:none;-webkit-tap-highlight-color:transparent}
.no-furigana rt{display:none}.no-furigana ruby{ruby-align:auto}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 200px)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0}
.chat-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.chat-msg.user{align-self:flex-end;background:#e94560;color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:#1a1a2e;border:1px solid #2a2a4a;border-bottom-left-radius:4px}
.chat-msg.assistant b,.chat-msg.assistant strong{color:#e94560}
.chat-msg pre{background:#0a0a12;padding:10px 12px;border-radius:8px;overflow-x:auto;font-size:13px;margin:6px 0;border:1px solid #2a2a4a}
.chat-msg code{background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:13px;color:#e94560}
.chat-msg pre code{background:none;padding:0;color:#e0e0e0}
.chat-input-area{display:flex;gap:8px;padding:8px 0}
.chat-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none}
.chat-input:focus{border-color:#e94560}
.chat-input::placeholder{color:#555}
.chat-send{padding:10px 20px;border-radius:8px;border:none;background:#e94560;color:#fff;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap}
.chat-send:disabled{background:#553;color:#666;cursor:default}
.chat-loading{text-align:center;color:#8888aa;font-size:13px;padding:16px;align-self:center}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 8px}
.chat-suggestions button{padding:6px 14px;border-radius:16px;border:1px solid #2a2a4a;background:#1a1a2e;color:#8888aa;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.chat-suggestions button:active{background:rgba(233,69,96,0.2);border-color:#e94560}
.chat-welcome{text-align:center;padding:40px 12px;color:#666688;font-size:14px;line-height:1.6}
.chat-welcome .ic{font-size:36px;margin-bottom:10px}
.gear{position:fixed;bottom:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1px solid #2a2a4a;background:#1a1a2e;color:#666688;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;transition:all .15s;user-select:none}
.gear:active{background:#2a2a4a;color:#e0e0e0}
.mq-hidden{display:none!important}
.mq-progress{text-align:center;color:#8888aa;font-size:13px;margin-bottom:12px}
.mq-type{display:inline-block;background:rgba(233,69,96,0.15);color:#e94560;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.mq-question{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;padding:18px;font-size:18px;line-height:1.7;margin-bottom:16px}
.mq-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.mq-option{text-align:left;padding:12px 16px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;line-height:1.5;cursor:pointer;transition:all .15s;user-select:none}
.mq-option:active{background:rgba(255,255,255,0.04)}
.mq-option.correct{border-color:#2ecc71;background:rgba(46,204,113,0.12);color:#2ecc71}
.mq-option.incorrect{border-color:#e74c3c;background:rgba(231,76,60,0.12);color:#e74c3c}
.mq-option.disabled{cursor:default;opacity:.7;pointer-events:none}
.mq-option .ol{color:#8888aa;margin-right:8px}
.mq-option.correct .ol,.mq-option.incorrect .ol{font-weight:700}
.mq-explain{background:rgba(233,69,96,0.06);border:1px solid rgba(233,69,96,0.2);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.6;color:#aaaacc;margin-bottom:16px}
.mq-explain strong{color:#e94560}
.mq-nav{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:16px}
.mq-dot{width:28px;height:28px;border-radius:50%;border:1px solid #2a2a4a;background:#1a1a2e;color:#666688;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mq-dot.current{border-color:#e94560;background:rgba(233,69,96,0.2);color:#e94560}
.mq-dot.correct-dot{border-color:#2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71}
.mq-dot.incorrect-dot{border-color:#e74c3c;background:rgba(231,76,60,0.15);color:#e74c3c}
.mq-next{width:100%;padding:12px;border-radius:8px;border:none;background:#e94560;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.mq-next:disabled{background:#553;color:#666;cursor:default}
.mq-summary{text-align:center;padding:20px 0}
.mq-score{font-size:48px;font-weight:700;color:#e94560;margin-bottom:4px}
.mq-score-label{font-size:14px;color:#8888aa;margin-bottom:20px}
.mq-breakdown{margin-bottom:20px}
.mq-breakdown-item{padding:8px 16px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;font-size:14px}
.mq-breakdown-item .bl{color:#aaaacc}.mq-breakdown-item .bv{font-weight:600;color:#e0e0e0}
.mq-buttons{display:flex;gap:10px}.mq-buttons button{flex:1;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class=hdr>
  <h1>JLPT Grammar Practice</h1>
  <p>Generate sentences with DeepSeek AI</p>
</div>
<div class=tb>
  <button class=act data-t=gen>Generate</button>
  <button data-t=ref>Grammar Ref</button>
  <button data-t=hist>History</button>
  <button data-t=chat>Chat</button>
</div>
<div class=ct id=tab-gen>
  <div class=lg>
    <button data-l=N5>N5<small>Beginner</small></button>
    <button class=act data-l=N4>N4<small>Elementary</small></button>
    <button data-l=N3>N3<small>Intermediate</small></button>
  </div>
  <div class=mt>
    <button class=act data-md=s>Sentences</button>
    <button data-md=t>Short Text</button>
    <button data-md=mq>Mock Test</button>
  </div>
  <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap"><label style="font-size:13px;color:#8888aa">Furigana: <input type=checkbox id=furigana checked></label></div>
  <details class=gs>
    <summary>Choose specific grammar (optional)</summary>
    <input id=gs placeholder=Search><div class=gc id=gc></div>
  </details>
  <div class=sr>
    <label>Grammar points: <select id=cnt><option value=3>3</option><option value=5 selected>5</option><option value=8>8</option><option value=10>10</option></select></label>
    <label>EN: <input type=checkbox id=trans checked></label>
    <label>Target Vocab: <select id=vl><option value=3 selected>3</option><option value=4>4</option><option value=5>5</option></select></label>
    <label>Story Length: <select id=stl><option value=100>100 words</option><option value=200 selected>200 words</option><option value=300>300 words</option><option value=400>400 words</option><option value=500>500 words</option></select></label>
  </div>
  <div class=ctrls>
    <button class=bgen id=gen>Generate</button>
    <button class=bclr id=clr>Clear</button>
  </div>
  <div id=res></div>
</div>
<div class=ct id=tab-ref style=display:none>
  <h2 style="margin-bottom:20px;color:#e94560">Grammar Reference</h2>
  <div id=gr-content></div>
</div>
<div class=ct id=tab-hist style=display:none>
  <div id=hl><div class=es><div class=ic>&#128203;</div><h3>No history yet</h3></div></div>
  <button class=bclr id=clh style="width:100%;margin-top:12px;padding:10px;border-radius:8px;border:none;cursor:pointer">Clear History</button>
</div>
<div class=ct id=tab-chat style=display:none>
  <div class=chat-container>
    <div class=chat-msgs id=chatMsgs>
      <div class=chat-welcome>
        <div class=ic>&#127760;</div>
        <p>Ask me anything about Japanese grammar, vocabulary, or usage. I'll explain with examples!</p>
      </div>
    </div>
    <div class=chat-suggestions id=chatSuggestions>
      <button data-q="Explain the difference between は and が">は vs が</button>
      <button data-q="How do I use the 〜ている form? Explain with examples">〜ている form</button>
      <button data-q="What's the difference between てあげる, ておく, and てもらう?">てあげる・ておく・てもらう</button>
      <button data-q="Explain 〜かもしれない with example sentences">〜かもしれない</button>
    </div>
    <div class=chat-input-area>
      <input class=chat-input id=chatInput placeholder="Ask a question..." autocomplete=off>
      <button class=chat-send id=chatSend>Send</button>
    </div>
  </div>
</div>
<div class=ct id=tab-set style=display:none>
  <h3 style="margin-bottom:16px">Settings</h3>
  <p>DeepSeek API Key<br><input type=password id=key placeholder="sk-..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"></p>
  <p style=margin-top:12px>Model<br><select id=mdl style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"><option value=deepseek-v4-flash>deepseek-v4-flash</option></select></p>
  <p style=margin-top:12px>Temperature: <span id=tv>1.0</span><br><input type=range id=tr min=0.1 max=1.5 step=0.1 value=1.0 style="width:100%;accent-color:#e94560"></p>
  <button id=svs style="padding:10px 24px;border-radius:8px;border:none;background:#e94560;color:#fff;font-weight:600;cursor:pointer">Save</button>
</div>
<button class=gear id=gearBtn aria-label=Settings>&#9881;</button>
<script>
var G="__GRAMMAR_JSON__";
var V="__VOCAB_JSON__";
var T="__TOPICS_JSON__";
if(typeof G==='string')G=[];
if(typeof V==='string')V=[];
if(typeof T==='string')T={};
var SK='jga4';
var S=JSON.parse(localStorage.getItem(SK+'_s')||'{}');
if(!S.apiKey)S={apiKey:'',model:'deepseek-v4-flash',temperature:0.5};
var H=JSON.parse(localStorage.getItem(SK+'_h')||'[]');
var curMode='s';
var lastUsage=null;
var chatMessages=[];
var CHAT_SYS='You are a knowledgeable Japanese teacher. Help learners understand Japanese grammar, vocabulary, and usage.\n\nGuidelines:\n- Explain concepts simply and clearly.\n- Include 1-2 example sentences in Japanese with English translations for each point.\n- Be concise but thorough - cover key points without unnecessary detail.\n- Provide hiragana readings for kanji when introducing new words.\n- When comparing grammar points, explain the nuance differences with contrasting examples.\n\nFormat your response with markdown for readability.';
var mqState=null;
var MQ_CACHE_KEY='jga4_mq';
var MQ_TOTAL=15;
var MQ_REFILL=3;
function sH(){localStorage.setItem(SK+'_h',JSON.stringify(H.slice(0,200)))}
function sh(a){for(var i=a.length-1;i>0;i--){var j=Math.random()*(i+1)|0;var t=a[i];a[i]=a[j];a[j]=t}return a}
function pr(a,n){var s=sh([].concat(a));return s.slice(0,Math.min(n,s.length))}
function gV(l){var m={N3:['N3','N4','N5'],N4:['N4','N5'],N5:['N5']};var n=m[l]||[];return V.filter(function(v){var t=(v.tags||'').toUpperCase();for(var i=0;i<n.length;i++){if(t.indexOf('JLPT_'+n[i])>-1)return true}return false})}
function gG(l){return G.filter(function(g){return g.jlpt_level===l})}
function gT(l){var level='n'+l.toLowerCase().replace('n','');return T[level]||{}}
function pickTopic(l){var topics=gT(l);var keys=Object.keys(topics);if(!keys.length)return null;var rkey=keys[Math.floor(Math.random()*keys.length)];return {name:rkey,vocabs:topics[rkey]}}
function pickTopicVocabs(topicVocabs,count){if(!topicVocabs||!topicVocabs.length)return[];var selected=sh([].concat(topicVocabs));return selected.slice(0,Math.min(count||4,selected.length))}
function bP(l,sl,c,tr,mode,storyLen){
  var p=sl.length>0?sl.slice(0,c):pr(gG(l),c);
  var grammarCount=p.length;
  var gd=p.map(function(g){return g.grammar_point}).join('\n- ');
  if(mode==='t'){
    var vc=parseInt(document.getElementById('vl').value)||3;
    var topic=pickTopic(l);
    var tvocabs=topic?pickTopicVocabs(topic.vocabs,vc):[];
    var topicDesc=topic?'about '+topic.name.replace(/_/g,' '):'a natural everyday topic';
    var vocabList=tvocabs.length?'- '+tvocabs.join('\n- '):'(Choose naturally fitting vocabulary)';
    var t='Write an authentic JLPT '+l+' reading practice passage in Japanese, approximately '+storyLen+' words, about '+topicDesc+'.\n\n';
    t+='Level and style:\n';
    t+='- Target JLPT '+l+'. Use mostly '+l+' grammar and vocabulary, with easier lower-level language where natural.\n';
    t+='- Do not make it childish or overly simplified. It should feel like a real graded reading passage, not a list of short diary sentences.\n';
    t+='- Avoid grammar, idioms, and kanji that are clearly above '+l+', unless the meaning is obvious from context.\n';
    t+='- Use a natural mix of sentence lengths. Include several longer sentences with subordinate clauses, reasons, contrasts, conditions, quotations, or relative clauses.\n';
    t+='- Use discourse connectors naturally, such as しかし, そのため, 一方で, とはいえ, その結果, ところが, 例えば, depending on the level and context.\n\n';
    t+='Required grammar focus:\n';
    t+='- Use these grammar patterns naturally where possible: '+gd+'\n';
    t+='- Prefer quality and coherence over forcing every pattern awkwardly.\n\n';
    t+='Target vocabulary:\n';
    t+='- Try to include '+vc+' of these words if they fit naturally. Do not force awkward words into the passage:\n'+vocabList+'\n\n';
    t+='Output exactly this JSON format (no other text):\n';
