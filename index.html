 "ものだ (mono da): used to do something, should do something", "sentence": "私は言い訳だけはしたくないの。人間というのは一度言い訳を始めると、限りなく言い訳をしてしまうものだし。", "short_explanation": "Used to describe a general truth, natural tendency, or something that typically happens.", "translation": "I don't want to make excuses. Once humans start making excuses, they tend to endlessly make them."}, {"id": 213, "jlpt_level": "N3", "grammar_point": "もしかしたら (moshikashitara): perhaps, maybe", "sentence": "もしかしたら私は彼と結婚するかもしれないのだ！", "short_explanation": "Expresses uncertainty or possibility, meaning 'perhaps' or 'maybe', often paired with かもしれない.", "translation": "Maybe I might marry him!"}, {"id": 214, "jlpt_level": "N3", "grammar_point": "向き (muki): suitable for", "sentence": "留学生向きの大学案内書が刊行された。", "short_explanation": "Indicates something is designed or suitable for a specific purpose or group.", "translation": "A university guidebook suitable for international students was published."}, {"id": 215, "jlpt_level": "N3", "grammar_point": "向け(muke): intended for, aimed at", "sentence": "私たちは大企業向けのハイエンドなネット・ソリューションを供給するという事業計画をまとめました。", "short_explanation": "Indicates something is designed, intended, or aimed at a specific group or purpose.", "translation": "We compiled a business plan to supply high-end network solutions aimed at large corporations."}, {"id": 216, "jlpt_level": "N3", "grammar_point": "ながらも (nagara mo): but, although, despite", "sentence": "「心配しないで」彼女は声を震わせながらも、力づけるように言った。", "short_explanation": "Indicates a contrast: an action or state occurs despite a contradictory condition.", "translation": "\"Don't worry,\" she said encouragingly, although her voice was trembling."}, {"id": 217, "jlpt_level": "N3", "grammar_point": "ないことはない (nai koto wa nai): can, is not impossible", "sentence": "わたしも留学したことがありますから、あなたの苦労が分からないことはありません。", "short_explanation": "Means 'it's not that...not', indicating something is possible or true to some extent.", "translation": "Since I have also studied abroad, it's not that I don't understand your struggles."}, {"id": 218, "jlpt_level": "N3", "grammar_point": "なんか / なんて (nanka / nante): such as, things like", "sentence": "けど、こんなことになるなんて、誰が予想したでしょう？", "short_explanation": "Indicates belittling, surprise, or emphasis, often meaning 'such as' or 'things like'.", "translation": "But, who would have predicted that things would turn out like this?"}, {"id": 219, "jlpt_level": "N3", "grammar_point": "なぜなら/なぜかというと (nazenara/naze ka to iu to): because, the reason is", "sentence": "愛し合ってる者同士は喧嘩するものよ。なぜかというとお互いに相手をよくわかっていないからなの。よくわかったころにはすでに愛情はさめてるわ。", "short_explanation": "Explains a reason or cause, similar to 'because' in English, often used to justify a previous statement.", "translation": "Lovers fight with each other. That's because they don't fully understand each other yet. By the time they do, the love has already cooled."}, {"id": 220, "jlpt_level": "N3", "grammar_point": "んだって (ndatte): I heard that", "sentence": "彼女、休みには会いに来るんだって。", "short_explanation": "Indicates hearsay or reporting information someone else said, meaning 'I heard that.'", "translation": "I heard that she will come to visit during her break."}, {"id": 221, "jlpt_level": "N3", "grammar_point": "に違いない(ni chigai nai): I'm sure, no doubt that", "sentence": "あそこには、この世の始源から見つかったことのないでっかい秘密が埋もれているに違いないぞ。", "short_explanation": "Expresses strong conviction or certainty that something is true, based on evidence or reasoning.", "translation": "I'm sure a huge secret that has never been found since the beginning of this world is buried over there."}, {"id": 222, "jlpt_level": "N3", "grammar_point": "にかけて (ni kakete): over (a period), through, concerning", "sentence": "ＮＧＯのフリーダム・ハウスによれば、２００７年から２０１１年にかけて、アジアは世界において唯一、政治的な権利と市民の自由が着実に増している地域でもある。", "short_explanation": "Indicates a range or span over time or space, meaning 'over a period' or 'through'.", "translation": "According to the NGO Freedom House, from 2007 to 2011, Asia was also the only region in the world where political rights and civil liberties steadily increased."}, {"id": 223, "jlpt_level": "N3", "grammar_point": "に関する / に関して (ni kansu ru / ni kanshite): related to", "sentence": "２０世紀の日本を含む、立憲君主制を取る国のほとんどには、継承に関する正規の形式が存在します。", "short_explanation": "Indicates 'regarding' or 'concerning' a topic, used to specify the subject of discussion.", "translation": "In most countries with constitutional monarchy, including 20th-century Japan, there exist formal procedures regarding succession."}, {"id": 224, "jlpt_level": "N3", "grammar_point": "にかわって (ni kawatte): in stead of, on behalf of", "sentence": "彼は父親に代わって経営に携わるのは時間の問題だ。", "short_explanation": "Indicates acting or doing something in place of someone or something else.", "translation": "It's only a matter of time before he takes part in management on behalf of his father."}, {"id": 225, "jlpt_level": "N3", "grammar_point": "に比べて (ni kurabete): compared to", "sentence": "アメリカでの生活は、日本に比べてどのような違いがありましたか？", "short_explanation": "Indicates comparison, meaning 'compared to' or 'in comparison with'.", "translation": "How did life in America differ compared to Japan?"}, {"id": 226, "jlpt_level": "N3", "grammar_point": "において/ における (ni oite / ni okeru): in, on, at, as for, regarding", "sentence": "人々を統べる最高権威を有するのは誰かというのは、今日にあっても世界各地の社会において、いまだ決着のついていない論題です。", "short_explanation": "Indicates location, time, or context for an action or state, often formal.", "translation": "The question of who holds supreme authority to govern people remains an unresolved issue in societies around the world even today."}, {"id": 227, "jlpt_level": "N3", "grammar_point": "にしては (ni shite wa): for, considering it's", "sentence": "彼は大学時代の体形のままとはいかないが、いまも引きしまったしなやかな肉体を保っていて、五十代の男にしては悪くない。", "short_explanation": "Indicates that something is contrary to expectation given a certain standard or category.", "translation": "He can't maintain his college physique, but he still keeps a toned, flexible body, which isn't bad for a man in his fifties."}, {"id": 228, "jlpt_level": "N3", "grammar_point": "にしても (ni shite mo): even if", "sentence": "パキスタンや米国、その他の国の影響と関与があったにしても、結局これはアフガニスタンの人々のあいだの戦争であり、彼らの国の将来がかかっている。", "short_explanation": "Means 'even if' or 'granted that', indicating a concession or hypothetical condition.", "translation": "Even if there was influence and involvement from Pakistan, the US, and other countries, in the end this is a war among the people of Afghanistan, and the future of their country is at stake."}, {"id": 229, "jlpt_level": "N3", "grammar_point": "に対して (ni taishite): in contrast to, while, in regard to", "sentence": "私たちの目標は、貧しい子どもたちの窮状に対して何か手を打つことだ。", "short_explanation": "Indicates contrast or opposition between two things, or expresses 'toward/regarding' something.", "translation": "Our goal is to take action regarding the plight of poor children."}, {"id": 230, "jlpt_level": "N3", "grammar_point": "にとって (ni totte): to, for, concerning", "sentence": "道路や電気、水道は、すべての都市にとって重要なインフラだ。", "short_explanation": "Indicates from the perspective or standpoint of someone or something, meaning 'for' or 'to'.", "translation": "Roads, electricity, and water supply are important infrastructure for all cities."}, {"id": 231, "jlpt_level": "N3", "grammar_point": "について (ni tsuite): concerning, regarding", "sentence": "ほとんどの人がイギリスの地下鉄システムについて文句を言うね。", "short_explanation": "Indicates the topic or subject being discussed, equivalent to 'concerning' or 'regarding'.", "translation": "Most people complain about the London Underground system, don't they?"}, {"id": 232, "jlpt_level": "N3", "grammar_point": "につれ/につれて (ni tsure/ni tsurete): as... then", "sentence": "タイの高齢化が進むにつれ、この国の高齢者にはより多くのこうした施設が必要になるでしょう。", "short_explanation": "Indicates that as one thing changes, another changes accordingly, like 'as... then...'.", "translation": "As aging progresses in Thailand, more such facilities will be needed for the elderly in this country."}, {"id": 233, "jlpt_level": "N3", "grammar_point": "によると / によれば (ni yoru to / ni yoreba): according to", "sentence": "広まっていた噂によると、この男は数ヶ月前から異常な妄想に取り憑かれていたらしい。", "short_explanation": "Indicates the source of information, meaning 'according to'.", "translation": "According to widespread rumors, this man had been possessed by abnormal delusions since a few months ago."}, {"id": 234, "jlpt_level": "N3", "grammar_point": "によって / による (ni yotte / ni yoru): by means of, due to", "sentence": "選挙環境が、基本的自由や政治的権利の制限、厳しいメディア統制、市民社会に対する締め付けの強化によって、悪影響を受けていました。", "short_explanation": "Indicates means, cause, or agent; translates as 'by means of' or 'due to'.", "translation": "The election environment was adversely affected by restrictions on basic freedoms and political rights, strict media control, and tightened constraints on civil society."}, {"id": 235, "jlpt_level": "N3", "grammar_point": "間に/の間に (aida ni/no aida ni): while, during", "sentence": "あれこれ計画を立てている間にいろんなことが起こるのが人生だ。", "short_explanation": "Indicates an action or event that occurs during a specific time period or while another action is ongoing.", "translation": "Life is about various things happening while you're making all sorts of plans."}, {"id": 236, "jlpt_level": "N3", "grammar_point": "をはじめ (o hajime): for example, starting with", "sentence": "東京をはじめ、たくさんの大都会へ行ったこともあるのに、わが家ほどいいところはない。", "short_explanation": "Indicates 'starting with' or 'for example', listing a primary example among others.", "translation": "Even though I've been to many big cities, starting with Tokyo, there's no place as good as my home."}, {"id": 237, "jlpt_level": "N3", "grammar_point": "おかげで (okage de): thanks to, because of", "sentence": "こうした独自の体験のおかげで、世界を、違った、より想像力豊かな目で見られるようになったと思われますか？", "short_explanation": "Indicates that something positive happened due to someone or something's help or influence.", "translation": "Do you think that thanks to these unique experiences, you have come to see the world with different, more imaginative eyes?"}, {"id": 238, "jlpt_level": "N3", "grammar_point": "っぱなし (ppanashi): leaving something on, leaving something still in use", "sentence": "私は夜になると片付けものをしながら、リビングのテレビを一時間から二時間つけっぱなしにしています。", "short_explanation": "Indicates leaving something in a state or doing something continuously without change.", "translation": "In the evening, I leave the living room TV on for one to two hours while tidying up."}, {"id": 239, "jlpt_level": "N3", "grammar_point": "っぽい (ppoi): -ish, -like", "sentence": "めったに使わない部屋は、なにもかも湿っぽくなります。", "short_explanation": "Attached to nouns or verbs to indicate something has a certain quality or tendency, like '-ish' or '-like'.", "translation": "Rooms that are rarely used become damp and musty."}, {"id": 240, "jlpt_level": "N3", "grammar_point": "さえ (sae): even", "sentence": "このドラマは、主演俳優の僕でさえも「続きが早く見たい！」と思うほどの脚本です。", "short_explanation": "Indicates 'even', emphasizing an extreme or minimum example to imply others are similar.", "translation": "This drama's script is so good that even I, the lead actor, think 'I want to see the continuation soon!'"}, {"id": 241, "jlpt_level": "N3", "grammar_point": "さえ～ば (sae ~ ba): if only... then", "sentence": "経営さえうまく行えば、この施設は莫大な利益をあげる可能性をもつ。", "short_explanation": "Indicates that if a specific condition is met, everything else will follow.", "translation": "If only management goes well, this facility has the potential to generate enormous profits."}, {"id": 242, "jlpt_level": "N3", "grammar_point": "最中で/最中に (saichuu de/saichuu ni): in the middle of", "sentence": "危機の最中であっても、彼女は人々の声に耳を傾け、冷静さを保ち、すべての人に敬意を持って接します。", "short_explanation": "Indicates being in the middle of an action or event, emphasizing ongoing state.", "translation": "Even in the middle of a crisis, she listens to people's voices, remains calm, and treats everyone with respect."}, {"id": 243, "jlpt_level": "N3", "grammar_point": "せいで (sei de): because of", "sentence": "病院で投与された鎮静剤のせいで、思考も視界もぼやけていた。", "short_explanation": "Indicates a negative cause or reason, often resulting in an undesirable outcome.", "translation": "Because of the sedative administered at the hospital, both my thoughts and vision were blurred."}, {"id": 244, "jlpt_level": "N3", "grammar_point": "次第 (shidai): as soon as, dependent upon", "sentence": "お名前をお調べしたところ、特記事項がありまして、連絡がつきしだいシェリフにおつなぎすることになっています。", "short_explanation": "Indicates 'as soon as' or 'depending on', showing immediate action upon condition.", "translation": "After checking your name, there was a special note, and as soon as I can contact you, I will connect you to the sheriff."}, {"id": 245, "jlpt_level": "N3", "grammar_point": "しかない (shika nai): have no choice but", "sentence": "利益をあげるには経費を切り詰めるしかなく、ぜいたくが入り込める余地はない。", "short_explanation": "Expresses that there is no other option or choice but to do something.", "translation": "To make a profit, we have no choice but to cut costs; there is no room for luxury."}, {"id": 246, "jlpt_level": "N3", "grammar_point": "その結果 (sono kekka): as a result", "sentence": "全然勉強をしなかった。その結果、入学試験に落ちてしまった。", "short_explanation": "Indicates a cause-and-effect relationship, meaning 'as a result' or 'consequently'.", "translation": "I didn't study at all. As a result, I failed the entrance exam."}, {"id": 247, "jlpt_level": "N3", "grammar_point": "そうもない (sou mo nai): very unlikely to", "sentence": "彼らが納得されて戦闘をやめるなど、起こりそうもない。", "short_explanation": "Indicates that something is extremely unlikely to happen or occur.", "translation": "It is very unlikely that they will be convinced and stop fighting."}, {"id": 248, "jlpt_level": "N3", "grammar_point": "たびに (tabi ni): each time, everytime, whenever", "sentence": "自分の考えを正直に口にするたびに、みんなに驚かれたものだ。", "short_explanation": "Means 'each time/every time/whenever' something happens, indicating a repeated action or event.", "translation": "Every time I honestly spoke my mind, people were surprised."}, {"id": 249, "jlpt_level": "N3", "grammar_point": "ために (tame ni) 1: for, for the sake of, in order to", "sentence": "国のために亡くなるのは永久に生きることだ。", "short_explanation": "Indicates purpose or benefit, meaning 'for the sake of' or 'in order to'.", "translation": "Dying for one's country is to live forever."}, {"id": 250, "jlpt_level": "N3", "grammar_point": "ために (tame ni) 2: because of, as a result of", "sentence": "長引く干ばつのため、新鮮な青果は品不足だった。", "short_explanation": "Indicates cause or reason, meaning 'because of' or 'due to' something.", "translation": "Due to the prolonged drought, fresh produce was in short supply."}, {"id": 251, "jlpt_level": "N3", "grammar_point": "たらいい/といい (tara ii / to ii): it would be nice if, should, I hope", "sentence": "我々はアジアにおいて米国の利益のバランスをどうとったらいいのかを話し合った。", "short_explanation": "Expresses hope or suggestion that something would be good if it happens.", "translation": "We discussed how to balance U.S. interests in Asia."}, {"id": 252, "jlpt_level": "N3", "grammar_point": "たとえ～ても (tatoe ~ temo): even if... is the case", "sentence": "このチャレンジは、たとえいまは大変に思えても、がんばって続けていくうちにだんだん楽になっていく。", "short_explanation": "Means 'even if' a hypothetical or extreme condition holds, the result remains unchanged.", "translation": "Even if this challenge seems tough now, it will gradually become easier as you keep trying hard."}, {"id": 253, "jlpt_level": "N3", "grammar_point": "たとたん (ta totan): just (now, at the moment), as soon as", "sentence": "階段に兵士たちが現れた。猛然と上をめざしていたが、廊下の暗がりに老人の姿を認めたとたん、立ち止まった。", "short_explanation": "Indicates that as soon as one action occurs, another immediately follows, often unexpectedly.", "translation": "Soldiers appeared on the stairs. They were charging upward, but as soon as they spotted an old man in the dark hallway, they stopped."}, {"id": 254, "jlpt_level": "N3", "grammar_point": "てごらん (te goran): (please) try to, (please) look", "sentence": "そのソファにでもかけてぜんぶうちあけてごらんなさい。", "short_explanation": "A soft command meaning 'try to do' or 'please look', used to request an action.", "translation": "Try sitting on that sofa and tell me everything."}, {"id": 255, "jlpt_level": "N3", "grammar_point": "てはじめて (te hajimete): not until, only after... did I", "sentence": "いま、生まれて初めて、複雑な人間性というものに直面している。", "short_explanation": "Expresses that something is realized or happens only after a specific action or event.", "translation": "Now, for the first time in my life, I am facing what is called complex human nature."}, {"id": 256, "jlpt_level": "N3", "grammar_point": "てもかまわない (temo kamawanai): it doesn't matter if", "sentence": "濡れてもかまわないならそれでいいが、Ｔシャツも脱いだほうがいい。", "short_explanation": "Indicates that something is acceptable or doesn't matter, often implying permission or no problem.", "translation": "If you don't mind getting wet, that's fine, but you'd better take off your T-shirt too."}, {"id": 257, "jlpt_level": "N3", "grammar_point": "といっても (to itte mo): although I say, although one might say", "sentence": "私たちは夜の間どこかに隠れることを考えなくちゃ。いくら武装してるといっても、結局三人しかいないんだからね。", "short_explanation": "Indicates that despite saying something, the reality is different or less significant.", "translation": "We have to think about hiding somewhere at night. Although I say we're armed, in the end there are only three of us."}, {"id": 258, "jlpt_level": "N3", "grammar_point": "という (to iu): called, named, as much as", "sentence": "パイロットという職業で、いちばん好きなのはどんなことですか？", "short_explanation": "Indicates the name, title, or content of something, meaning 'called' or 'named'.", "translation": "What do you like most about the job called pilot?"}, {"id": 259, "jlpt_level": "N3", "grammar_point": "ということだ (to iu koto da): I've heard that, rumour has it that, it means that", "sentence": "人生におけるわたしの目的は、完全に快適な状態で暮すということだ。", "short_explanation": "Indicates hearsay or rumor, meaning 'I've heard that' or 'it is said that'.", "translation": "I've heard that my purpose in life is to live in a completely comfortable state."}, {"id": 260, "jlpt_level": "N3", "grammar_point": "というのは (to iu nowa): means, is, because", "sentence": "結婚しようと思う誰もが結婚できるというのは、とても大事なことです。", "short_explanation": "Defines or explains a term or concept, often meaning 'the thing called' or 'because'.", "translation": "The fact that everyone who wants to get married can get married is a very important thing."}, {"id": 261, "jlpt_level": "N3", "grammar_point": "というと/といえば (to iu to/to ieba): speaking of, if it were the case that", "sentence": "五億円といえば、駅全体を立て直すことができるほどの金額だ。", "short_explanation": "Used to introduce a topic or remark based on something just mentioned, meaning 'speaking of' or 'if we talk about'.", "translation": "Speaking of 500 million yen, it's an amount that can rebuild an entire train station."}, {"id": 262, "jlpt_level": "N3", "grammar_point": "というより (to iu yori): rather than", "sentence": "父はこの国と恋に落ちたんです。今や、イングランド人というより、日本人的だと思います、本当のところ。", "short_explanation": "Means 'rather than' or 'more than', used to correct or refine a previous statement.", "translation": "My father fell in love with this country. Now, I think he's more Japanese than English, to be honest."}, {"id": 263, "jlpt_level": "N3", "grammar_point": "ところで (tokoro de): by the way", "sentence": "ところで今日友達とボートを出す計画なんだ。いっしょに行かないか？", "short_explanation": "Used to change the topic of conversation, similar to 'by the way' in English.", "translation": "By the way, I'm planning to take out a boat with a friend today. Won't you come along?"}, {"id": 264, "jlpt_level": "N3", "grammar_point": "ところが (tokoro ga): even so, however, even though", "sentence": "私は戦いで死ぬことを求めました。ところが私は死なずに生き残り、戦闘は今も続いております。", "short_explanation": "Indicates a contrast or unexpected result, meaning 'however' or 'even though'.", "translation": "I sought death in battle. However, I survived and the fighting continues even now."}, {"id": 265, "jlpt_level": "N3", "grammar_point": "とおり (toori): in the way, the same as", "sentence": "ご覧の通りあの馬はかなり高価な馬なんだ。", "short_explanation": "Indicates something is done in the same way or manner as something else, meaning 'just as' or 'the same as'.", "translation": "As you can see, that horse is quite expensive."}, {"id": 266, "jlpt_level": "N3", "grammar_point": "としたら / とすれば (to shitara / to sureba): if it were the case that, if we assume", "sentence": "あなたには何の問題もない。もし問題があるとしたら、それは私の方だ。", "short_explanation": "Expresses a hypothetical condition or assumption, meaning 'if it were the case that...'", "translation": "You have no problems at all. If there is a problem, it's on my side."}, {"id": 267, "jlpt_level": "N3", "grammar_point": "として (to shite): as (i.e. in the role of)", "sentence": "Google の検索履歴はファイルとしてダウンロードすることも可能だ。", "short_explanation": "Indicates the role, capacity, or function in which something or someone acts.", "translation": "Google search history can also be downloaded as a file."}, {"id": 268, "jlpt_level": "N3", "grammar_point": "とは限らない (towa kagiranai): not necessarily so, is not always true", "sentence": "このような特質がより幸せな、あるいはより質の高い人生をもたらすとは限らない。", "short_explanation": "Means 'not necessarily' or 'it is not always the case that', indicating a possibility of exception.", "translation": "Such traits do not necessarily lead to a happier or higher quality life."}, {"id": 269, "jlpt_level": "N3", "grammar_point": "ついでに (tsuide ni): while you are at it, on the occasion", "sentence": "ブログのおかげで人々はテレビに向かって叫ばなくてよくなり、ついでに意見をいう場が持っている。", "short_explanation": "Means 'while you are at it' or 'on the occasion of', used to do something additional during an action.", "translation": "Thanks to blogs, people no longer have to shout at the TV, and while they're at it, they have a place to express their opinions."}, {"id": 270, "jlpt_level": "N3", "grammar_point": "つまり (tsumari): in other words; that is to say", "sentence": "それであなたもほんとにそうだと思っておいでなんですか、つまり宇宙人が存在すると？", "short_explanation": "Used to rephrase or summarize a previous statement, meaning 'in other words' or 'that is to say'.", "translation": "So you really believe that, in other words, that aliens exist?"}, {"id": 271, "jlpt_level": "N3", "grammar_point": "と共に (to tomo ni): together with", "sentence": "聞き慣れた鈍いうなりとともに、いつもの冷気が押し寄せてきた。", "short_explanation": "Means 'together with' or 'along with', indicating two things happen simultaneously or accompany each other.", "translation": "Along with the familiar dull roar, the usual cold air rushed in."}, {"id": 272, "jlpt_level": "N3", "grammar_point": "うちに (uchi ni): while, before, doing", "sentence": "朝早く出て飛行機で往復すれば、たぶん夜の早いうちに帰ってくることができるだろうと思う。", "short_explanation": "Indicates an action occurs during a certain time period or before a state changes.", "translation": "I think if I leave early in the morning and go round trip by plane, I can probably return home early in the evening."}, {"id": 273, "jlpt_level": "N3", "grammar_point": "上で (ue de): after, when, in order to", "sentence": "政治混沌としている中で、正しい決断、十分に物事をわかったうえでの決断を下すのは、難しいかもしれませんね。", "short_explanation": "Indicates 'after doing something' or 'in the context of' a prior action or condition.", "translation": "In the midst of political chaos, it may be difficult to make correct decisions, decisions made after fully understanding things."}, {"id": 274, "jlpt_level": "N3", "grammar_point": "わけだ (wake da): for that reason, no wonder, as you'd expect", "sentence": "時計の鐘の残響はすでに消えている。これで正式に遅刻したわけだ。", "short_explanation": "Indicates a logical conclusion or reason, meaning 'it follows that' or 'no wonder'.", "translation": "The echo of the clock bell has already faded. So that means I'm officially late."}, {"id": 275, "jlpt_level": "N3", "grammar_point": "わけではない (wake dewa nai): it doesn't mean that, it is not the case", "sentence": "私は彼を憎むわけではない。会いたくないだけだ。", "short_explanation": "Indicates that something is not necessarily the case, often used to deny a general assumption.", "translation": "It doesn't mean that I hate him. I just don't want to see him."}, {"id": 276, "jlpt_level": "N3", "grammar_point": "わけがない (wake ga nai): there is no way that", "sentence": "誰か特定の人物に毒を盛ったという証明はされるわけがないのです。", "short_explanation": "Expresses strong conviction that something is impossible or cannot be true.", "translation": "There is no way that proof of someone poisoning a specific person will be provided."}, {"id": 277, "jlpt_level": "N3", "grammar_point": "わけにはいかない (wake niwa ikanai): must not, can't afford to", "sentence": "その電話をかけたら、もう一緒にはいられない。私は巻き込まれるわけにはいかないの。", "short_explanation": "Expresses that one cannot do something due to social or moral reasons; 'must not' or 'can't afford to'.", "translation": "If I make that call, we can't be together anymore. I can't afford to get involved."}, {"id": 278, "jlpt_level": "N3", "grammar_point": "わりに (wari ni): although, rather, unexpectedly", "sentence": "団地の規模の割りに負債が少なく、家賃収入は年間一億円に達している。", "short_explanation": "Indicates that something is unexpected or contrary to what is anticipated based on a standard.", "translation": "Although the housing complex is large, its debt is small, and annual rent income reaches 100 million yen."}, {"id": 279, "jlpt_level": "N3", "grammar_point": "ような気がする (you na ki ga suru): have a feeling that, think that", "sentence": "わたしはこれまでの人生で、いつもなんとか別な人間になろうとしていたような気がする。", "short_explanation": "Expresses a vague feeling or impression that something is the case, often based on intuition.", "translation": "I have a feeling that throughout my life, I was always trying to become a different person."}, {"id": 280, "jlpt_level": "N3", "grammar_point": "ように (you ni): in order to, so that", "sentence": "皆さん、寒い冬になりました。体調をくずさないように気をつけてください。", "short_explanation": "Expresses purpose or aim, meaning 'in order to' or 'so that' something happens.", "translation": "Everyone, it has become a cold winter. Please take care so that you don't catch a cold."}, {"id": 281, "jlpt_level": "N3", "grammar_point": "ようとする (you to suru): try to, be about to", "sentence": "私たちが食卓をはなれようとしたとき、誰か戸をたたくものがあった。", "short_explanation": "Expresses an attempt to do something or being on the verge of doing something.", "translation": "When we were about to leave the table, someone knocked on the door."}, {"id": 282, "jlpt_level": "N3", "grammar_point": "ようとしない (you to shinai): not try to, not make an effort to", "sentence": "あの女は何ごとか知っているんだ。絶対にまちがいない。しかもあの女はいおうとしないんだ。", "short_explanation": "Indicates someone does not attempt or make an effort to do something.", "translation": "That woman knows something. There's no doubt about it. And yet, she won't try to say it."}, {"id": 283, "jlpt_level": "N3", "grammar_point": "ずに (zuni): without doing", "sentence": "彼女は自分の目が信じられずに、三度もくり返し検査をした。", "short_explanation": "Means 'without doing' an action, indicating something is done while refraining from that action.", "translation": "She repeated the test three times without believing her own eyes."}, {"id": 284, "jlpt_level": "N3", "grammar_point": "ずにはいられない (zu niwa irarenai): can't help but feel, can't help but do", "sentence": "それでも私はうれしく思わずにはいられない。ずいぶん長いことこんなにうれしく思ったことはないくらいだ。", "short_explanation": "Expresses inability to stop oneself from doing something, often due to strong emotion.", "translation": "Even so, I can't help but feel happy. I haven't felt this happy in a long time."}];

  }else{

    t+='vocab items format: {"word": "kanji form", "reading": "hiragana", "meaning": "English"}\n';

  }
