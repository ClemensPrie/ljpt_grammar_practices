<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta http-equiv=Content-Type content="text/html; charset=UTF-8">
<meta name=viewport content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name=theme-color content=#1a1a2e>
<link rel=manifest href=manifest.json>
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<link rel=apple-touch-icon href=icon-192.png>
<title>JLPT Grammar Practice</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Helvetica Neue,sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh;padding-bottom:80px}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 16px 16px;border-bottom:1px solid #2a2a4a}
.hdr h1{font-size:22px;font-weight:700;color:#e94560}.hdr p{font-size:13px;color:#8888aa;margin-top:4px}
.tb{display:flex;background:#1a1a2e;border-bottom:1px solid #2a2a4a;position:sticky;top:0;z-index:10}
.tb button{flex:1;padding:12px;background:none;border:none;color:#666688;font-size:15px;font-weight:600;cursor:pointer}.tb button.act{color:#e94560;border-bottom:3px solid #e94560}
.ct{padding:16px;max-width:800px;margin:0 auto}
.lg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.lg button{padding:20px;border-radius:12px;border:2px solid #2a2a4a;background:#1a1a2e;color:#ccc;font-size:20px;font-weight:700;cursor:pointer}
.lg button.act{border-color:#e94560;background:rgba(233,69,96,0.15);color:#e94560}.lg button small{display:block;font-size:11px;font-weight:400;color:#8888aa;margin-top:4px}
.gs input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;margin-bottom:8px}
.gs summary{cursor:pointer;color:#e94560;font-weight:600;font-size:14px;padding:8px 0}
.gc{max-height:300px;overflow-y:auto;border:1px solid #2a2a4a;border-radius:8px}
.gc-item{padding:10px 12px;border-bottom:1px solid #1a1a2e;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;-webkit-tap-highlight-color:rgba(233,69,96,0.3);transition:background.15s}
.gc-item:active{background:rgba(255,255,255,0.04)}.gc-item.selected{background:rgba(233,69,96,0.15);color:#e94560;font-weight:600}
.gc-item.selected .cb{background:#e94560;color:#fff}.gc-item .cn{flex:1;min-width:0}.cb{padding:2px 6px;border-radius:4px;font-size:11px;background:#2a2a4a;color:#888;margin-left:auto;flex-shrink:0}
.gc-item .chk{visibility:hidden;font-size:14px;flex-shrink:0}
.gc-item.selected .chk{visibility:visible}
.mt{display:flex;background:#1a1a2e;border-radius:10px;overflow:hidden;border:1px solid #2a2a4a;margin-bottom:16px}
.mt button{flex:1;padding:10px;border:none;background:#1a1a2e;color:#8888aa;font-size:14px;font-weight:600;cursor:pointer}.mt button.act{background:#e94560;color:#fff}
.ctrls{display:flex;gap:10px;margin-bottom:20px}
.ctrls button{padding:12px 24px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;flex:1;min-width:120px}
.bgen{background:#e94560;color:#fff}.bgen:disabled{background:#553;color:#666}.bclr{background:#2a2a4a;color:#aaa}
.sr{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap}.sr label{font-size:13px;color:#8888aa}.sr select{padding:6px 10px;border-radius:6px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:13px}
.rc{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;padding:20px;margin-bottom:20px}
.rc .m{font-size:11px;color:#666688;margin-bottom:6px}.rc .jp{font-size:20px;line-height:1.6;margin-bottom:8px}
.rc .en{font-size:14px;color:#aaaacc;line-height:1.5;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #2a2a4a}
.rc .st{font-size:12px;color:#8888aa;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:12px}
.rc .vl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rc .vi{background:rgba(255,255,255,0.05);border-radius:6px;padding:6px 10px;font-size:13px}
.rc .vi .kj{font-weight:600;color:#e0e0e0}.rc .vi .kn{color:#8888aa;font-size:11px;margin-left:4px}.rc .vi .me{color:#aaaacc;font-size:11px;margin-left:4px}
.rc .gl{display:flex;flex-wrap:wrap;gap:4px}.rc .gi{background:rgba(233,69,96,0.15);color:#e94560;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600}
.usage{font-size:12px;color:#8888aa;background:#10101c;border:1px solid #2a2a4a;border-radius:8px;padding:10px 12px;margin-top:-8px;margin-bottom:20px}
.lod{text-align:center;padding:40px;color:#8888aa}.sp{display:inline-block;width:40px;height:40px;border:3px solid #2a2a4a;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.hi{padding:12px;border-bottom:1px solid #2a2a4a;font-size:13px;cursor:pointer}.hi .hl{font-weight:600;color:#e94560}.hi .hj{color:#ccc;margin:4px 0}.hi .he{color:#8888aa;font-size:12px}
.es{text-align:center;padding:60px 20px;color:#666688}.es .ic{font-size:48px;margin-bottom:12px}.es h3{font-size:18px;margin-bottom:8px;color:#8888aa}
.gr-level{margin-bottom:24px;border:1px solid #2a2a4a;border-radius:10px;overflow:hidden}
.gr-level summary{cursor:pointer;padding:14px 16px;background:#1a1a2e;font-weight:600;color:#e94560;user-select:none;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
.gr-level summary:hover{background:#16213e}
.gr-level[open]>summary{border-bottom:1px solid #e94560;background:rgba(233,69,96,0.1)}
.gr-level[open]>summary::after{transform:rotate(180deg)}
.gr-level summary::after{content:'⌄';transition:transform .2s}
.gr-group{border-bottom:1px solid #2a2a4a;margin:0}
.gr-group summary{cursor:pointer;padding:10px 20px;background:#0f0f1a;color:#8888aa;font-size:14px;font-weight:600;user-select:none}
.gr-group summary:hover{background:rgba(233,69,96,0.05);color:#aaaacc}
.gr-group[open]>summary{background:rgba(233,69,96,0.1);color:#e0e0e0;border-bottom:1px solid #2a2a4a}
.gr-item{padding:12px 24px;border-bottom:1px solid #0f0f1a;background:#0a0a12}
.gr-item:last-child{border-bottom:none}
.gr-point{font-weight:600;color:#e94560;font-size:14px;margin-bottom:4px}
.gr-explain{font-size:13px;color:#aaaacc;margin-bottom:6px;line-height:1.4}
.gr-sent{font-size:14px;color:#e0e0e0;background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:6px;margin-bottom:4px;line-height:1.5}
.gr-trans{font-size:13px;color:#8888aa;padding-left:10px;border-left:2px solid #2a2a4a}
::-webkit-scrollbar{width:6px}input[type=password]{caret-color:#e94560}
ruby{ ruby-align:center}rt{font-size:.45em;color:#e94560;user-select:none;-webkit-tap-highlight-color:transparent}
.no-furigana rt{display:none}.no-furigana ruby{ruby-align:auto}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 200px)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0}
.chat-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.chat-msg.user{align-self:flex-end;background:#e94560;color:#fff;border-bottom-right-radius:4px}
.chat-msg.assistant{align-self:flex-start;background:#1a1a2e;border:1px solid #2a2a4a;border-bottom-left-radius:4px}
.chat-msg.assistant b,.chat-msg.assistant strong{color:#e94560}
.chat-msg pre{background:#0a0a12;padding:10px 12px;border-radius:8px;overflow-x:auto;font-size:13px;margin:6px 0;border:1px solid #2a2a4a}
.chat-msg code{background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;font-size:13px;color:#e94560}
.chat-msg pre code{background:none;padding:0;color:#e0e0e0}
.chat-input-area{display:flex;gap:8px;padding:8px 0}
.chat-input{flex:1;padding:10px 14px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px;outline:none}
.chat-input:focus{border-color:#e94560}
.chat-input::placeholder{color:#555}
.chat-send{padding:10px 20px;border-radius:8px;border:none;background:#e94560;color:#fff;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap}
.chat-send:disabled{background:#553;color:#666;cursor:default}
.chat-loading{text-align:center;color:#8888aa;font-size:13px;padding:16px;align-self:center}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 8px}
.chat-suggestions button{padding:6px 14px;border-radius:16px;border:1px solid #2a2a4a;background:#1a1a2e;color:#8888aa;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.chat-suggestions button:active{background:rgba(233,69,96,0.2);border-color:#e94560}
.chat-welcome{text-align:center;padding:40px 12px;color:#666688;font-size:14px;line-height:1.6}
.chat-welcome .ic{font-size:36px;margin-bottom:10px}
.gear{position:fixed;bottom:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1px solid #2a2a4a;background:#1a1a2e;color:#666688;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;transition:all .15s;user-select:none}
.gear:active{background:#2a2a4a;color:#e0e0e0}
</style>
</head>
<body>
<div class=hdr>
  <h1>JLPT Grammar Practice</h1>
  <p>Generate sentences with DeepSeek AI</p>
</div>
<div class=tb>
  <button class=act data-t=gen>Generate</button>
  <button data-t=ref>Grammar Ref</button>
  <button data-t=hist>History</button>
  <button data-t=chat>Chat</button>
</div>
<div class=ct id=tab-gen>
  <div class=lg>
    <button data-l=N5>N5<small>Beginner</small></button>
    <button class=act data-l=N4>N4<small>Elementary</small></button>
    <button data-l=N3>N3<small>Intermediate</small></button>
  </div>
  <div class=mt>
    <button class=act data-md=s>Sentences</button>
    <button data-md=t>Short Text</button>
  </div>
  <details class=gs>
    <summary>Choose specific grammar (optional)</summary>
    <input id=gs placeholder=Search><div class=gc id=gc></div>
  </details>
  <div class=sr>
    <label>Grammar points: <select id=cnt><option value=3>3</option><option value=5 selected>5</option><option value=8>8</option><option value=10>10</option></select></label>
    <label>EN: <input type=checkbox id=trans checked></label>
<label>Furigana: <input type=checkbox id=furigana checked></label>
    <label>Target Vocab: <select id=vl><option value=3 selected>3</option><option value=4>4</option><option value=5>5</option></select></label>
    <label>Story Length: <select id=stl><option value=100>100 words</option><option value=200 selected>200 words</option><option value=300>300 words</option><option value=400>400 words</option><option value=500>500 words</option></select></label>
  </div>
  <div class=ctrls>
    <button class=bgen id=gen>Generate</button>
    <button class=bclr id=clr>Clear</button>
  </div>
  <div id=res></div>
</div>
<div class=ct id=tab-ref style=display:none>
  <h2 style="margin-bottom:20px;color:#e94560">Grammar Reference</h2>
  <div id=gr-content></div>
</div>
<div class=ct id=tab-hist style=display:none>
  <div id=hl><div class=es><div class=ic>&#128203;</div><h3>No history yet</h3></div></div>
  <button class=bclr id=clh style="width:100%;margin-top:12px;padding:10px;border-radius:8px;border:none;cursor:pointer">Clear History</button>
</div>
<div class=ct id=tab-chat style=display:none>
  <div class=chat-container>
    <div class=chat-msgs id=chatMsgs>
      <div class=chat-welcome>
        <div class=ic>&#127760;</div>
        <p>Ask me anything about Japanese grammar, vocabulary, or usage. I'll explain with examples!</p>
      </div>
    </div>
    <div class=chat-suggestions id=chatSuggestions>
      <button data-q="Explain the difference between は and が">は vs が</button>
      <button data-q="How do I use the 〜ている form? Explain with examples">〜ている form</button>
      <button data-q="What's the difference between てあげる, ておく, and てもらう?">てあげる・ておく・てもらう</button>
      <button data-q="Explain 〜かもしれない with example sentences">〜かもしれない</button>
    </div>
    <div class=chat-input-area>
      <input class=chat-input id=chatInput placeholder="Ask a question..." autocomplete=off>
      <button class=chat-send id=chatSend>Send</button>
    </div>
  </div>
</div>
<div class=ct id=tab-set style=display:none>
  <h3 style="margin-bottom:16px">Settings</h3>
  <p>DeepSeek API Key<br><input type=password id=key placeholder="sk-..." style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"></p>
  <p style=margin-top:12px>Model<br><select id=mdl style="width:100%;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a2e;color:#e0e0e0;font-size:14px"><option value=deepseek-v4-flash>deepseek-v4-flash</option></select></p>
  <p style=margin-top:12px>Temperature: <span id=tv>1.0</span><br><input type=range id=tr min=0.1 max=1.5 step=0.1 value=1.0 style="width:100%;accent-color:#e94560"></p>
  <button id=svs style="padding:10px 24px;border-radius:8px;border:none;background:#e94560;color:#fff;font-weight:600;cursor:pointer">Save</button>
</div>
<button class=gear id=gearBtn aria-label=Settings>&#9881;</button>
<script>
var G=[{"id": 1, "jlpt_level": "N5", "grammar_point": "だ / です (da / desu): to be", "sentence": "それは非常に面白いコメントですね。", "short_explanation": "Indicates 'to be' or state of being, used to equate or describe nouns and adjectives.", "translation": "That is a very interesting comment, isn't it?"}, {"id": 2, "jlpt_level": "N5", "grammar_point": "だけ (dake): only, just", "sentence": "私はただ臆測しただけです。", "short_explanation": "Indicates limitation, meaning 'only' or 'just' something, excluding others.", "translation": "I only just speculated."}, {"id": 3, "jlpt_level": "N5", "grammar_point": "だろう (darou): don’t you agree?, probably", "sentence": "あなたはそれいじょう、お金はいらないだろう。", "short_explanation": "Expresses conjecture or seeks agreement, like 'probably' or 'don't you think?'", "translation": "You probably don't need any more money."}, {"id": 4, "jlpt_level": "N5", "grammar_point": "で (de) - 1: in, at, on", "sentence": "ここでサッカーをしないでください。", "short_explanation": "Indicates the location where an action takes place.", "translation": "Please don't play soccer here."}, {"id": 5, "jlpt_level": "N5", "grammar_point": "で (de) - 2: by, with", "sentence": "震える指で、彼女は封筒を開けた。", "short_explanation": "Indicates the means or method by which an action is performed, like 'by' or 'with'.", "translation": "With trembling fingers, she opened the envelope."}, {"id": 6, "jlpt_level": "N5", "grammar_point": "でしょう (deshou): I think, probably", "sentence": "宿題は後でできるでしょう。", "short_explanation": "Expresses conjecture or probability, meaning 'probably' or 'I think'.", "translation": "I think I can do the homework later."}, {"id": 7, "jlpt_level": "N5", "grammar_point": "が (ga) - 1: subject marker", "sentence": "夏が過ぎ、冬がふたたびやって来た。", "short_explanation": "Marks the subject of a sentence, often used with intransitive verbs or to describe states.", "translation": "Summer passed, and winter came again."}, {"id": 8, "jlpt_level": "N5", "grammar_point": "が (ga) - 2: but, however, still", "sentence": "通路は広かったが真暗だった。", "short_explanation": "Connects two contrasting clauses, meaning 'but', 'however', or 'still'.", "translation": "The corridor was wide, but it was pitch dark."}, {"id": 9, "jlpt_level": "N5", "grammar_point": "がある (ga aru): to be, to exist (inanimate objects)", "sentence": "言いたいことがありますか？", "short_explanation": "Indicates existence or possession of inanimate objects, meaning 'there is/are' or 'have'.", "translation": "Is there something you want to say?"}, {"id": 10, "jlpt_level": "N5", "grammar_point": "がいる (gairu): to be, to exist (living objects)", "sentence": "図書館に人がいっぱいいる。", "short_explanation": "Indicates existence of living things, like people or animals, at a location.", "translation": "There are many people in the library."}, {"id": 11, "jlpt_level": "N5", "grammar_point": "ほうがいい (hou ga ii) - 1: had better, should", "sentence": "英会話をもっと練習したほうがいい。", "short_explanation": "Indicates a recommendation or advice, meaning 'had better' or 'should' do something.", "translation": "You should practice English conversation more."}, {"id": 12, "jlpt_level": "N5", "grammar_point": "ほうがいい (hou ga ii) - 2: it’d be better to not", "sentence": "約束を忘れないほうがいい。", "short_explanation": "Expresses that it is advisable not to do something.", "translation": "You'd better not forget the promise."}, {"id": 13, "jlpt_level": "N5", "grammar_point": "いちばん (ichiban): the most, the best", "sentence": "一番嫌いな男性のタイプは何ですか？", "short_explanation": "Indicates the highest degree or best among options, used to compare things.", "translation": "What is your most disliked type of man?"}, {"id": 14, "jlpt_level": "N5", "grammar_point": "か (ka) - 1: question particle", "sentence": "あなたがだれなのか、どうやってここへ来たのか、誰にもわからない。", "short_explanation": "Particle 'ka' turns a sentence into a question, often used with question words or to express uncertainty.", "translation": "No one knows who you are or how you came here."}, {"id": 15, "jlpt_level": "N5", "grammar_point": "か (ka) - 2: or", "sentence": "あの男たちは、佐々木か私を探しているのだ。", "short_explanation": "Particle 'か' between nouns means 'or', listing alternatives.", "translation": "Those men are looking for Sasaki or me."}, {"id": 16, "jlpt_level": "N5", "grammar_point": "から (kara) - 1: since, because", "sentence": "財布を忘れたから、電車の切符を買えなかった。", "short_explanation": "Indicates a reason or cause, meaning 'because' or 'since'.", "translation": "Because I forgot my wallet, I couldn't buy a train ticket."}, {"id": 17, "jlpt_level": "N5", "grammar_point": "から (kara) - 2: from, since", "sentence": "彼はやっと地獄から逃げ出した。", "short_explanation": "Indicates the starting point in time or place, meaning 'from' or 'since'.", "translation": "He finally escaped from hell."}, {"id": 18, "jlpt_level": "N5", "grammar_point": "けど / けれども (kedo / keredomo): but, however, although", "sentence": "千葉君は顔は汚いけど、心はとっても清いんです。", "short_explanation": "Connects two clauses, contrasting or adding background info, meaning 'but', 'however', or 'although'.", "translation": "Chiba-kun's face is dirty, but his heart is very pure."}, {"id": 19, "jlpt_level": "N5", "grammar_point": "くらい / ぐらい (kurai / gurai) - 1: about, approximately, at the very least", "sentence": "自分の服ぐらい自分で洗ってよ。", "short_explanation": "Indicates an approximate amount, degree, or extent, meaning 'about' or 'approximately'.", "translation": "At least wash your own clothes."}, {"id": 20, "jlpt_level": "N5", "grammar_point": "まだ (mada): still, not yet", "sentence": "わたしはまだ結婚していません。", "short_explanation": "Indicates that an action or state is still ongoing or has not yet occurred.", "translation": "I am not yet married."}, {"id": 21, "jlpt_level": "N5", "grammar_point": "まで (made): until, till, as far as, to (an extent)", "sentence": "この話に結着がつくまでお待ちになってください。", "short_explanation": "Indicates a limit in time, space, or degree, meaning 'until' or 'as far as'.", "translation": "Please wait until this matter is concluded."}, {"id": 22, "jlpt_level": "N5", "grammar_point": "まえに (mae ni): before, in front of", "sentence": "食事の前に手を洗ってください。", "short_explanation": "Indicates an action occurs before another, or location in front of something.", "translation": "Please wash your hands before eating."}, {"id": 23, "jlpt_level": "N5", "grammar_point": "ませんか (masen ka): let’s, won’t you", "sentence": "私のパーティーに参加しませんか？", "short_explanation": "Invites someone to do something politely, like 'won't you?' or 'let's'.", "translation": "Won't you join my party?"}, {"id": 24, "jlpt_level": "N5", "grammar_point": "ましょう (mashou): let’s, shall we", "sentence": "テストを始めましょうか？", "short_explanation": "Volitional form meaning 'let's do' or 'shall we do', used to suggest an action.", "translation": "Shall we start the test?"}, {"id": 25, "jlpt_level": "N5", "grammar_point": "も (mo): also, too, as well", "sentence": "僕も昨日徹夜で勉強しました。", "short_explanation": "Particle 'mo' indicates that something is also included, meaning 'too' or 'as well'.", "translation": "I also studied all night yesterday."}, {"id": 26, "jlpt_level": "N5", "grammar_point": "もう (mou): already, anymore", "sentence": "もう我慢できない。", "short_explanation": "Indicates that an action has already occurred or that a state no longer holds true.", "translation": "I can't stand it anymore."}, {"id": 27, "jlpt_level": "N5", "grammar_point": "な (na): don’t do (command)", "sentence": "銃を使うな！", "short_explanation": "Used to give a strong negative command, meaning 'don't do' something.", "translation": "Don't use the gun!"}, {"id": 28, "jlpt_level": "N5", "grammar_point": "ないでください (naide kudasai): please don’t", "sentence": "宿題をするのを忘れないでください。", "short_explanation": "Used to politely ask someone not to do something, meaning 'please don't'.", "translation": "Please don't forget to do your homework."}, {"id": 29, "jlpt_level": "N5", "grammar_point": "なる (naru): to become", "sentence": "彼女が美しくなりましたね。", "short_explanation": "Indicates a change of state, meaning 'to become' or 'to turn into'.", "translation": "She has become beautiful, hasn't she?"}, {"id": 30, "jlpt_level": "N5", "grammar_point": "に (ni): in, at, on", "sentence": "ここに名前を書いてください。", "short_explanation": "Indicates location or time where something exists or occurs.", "translation": "Please write your name here."}, {"id": 31, "jlpt_level": "N5", "grammar_point": "に/へ (ni/e): to", "sentence": "ベッドに戻りたい。", "short_explanation": "Indicates direction or destination of movement, like 'to' in English.", "translation": "I want to go back to bed."}, {"id": 32, "jlpt_level": "N5", "grammar_point": "にいく (ni iku): to go in order to do something", "sentence": "薪を集めに行こう!", "short_explanation": "Indicates going somewhere to perform an action, combining verb stem + にいく.", "translation": "Let's go gather firewood!"}, {"id": 33, "jlpt_level": "N5", "grammar_point": "にする (ni suru): to decide on", "sentence": "田舎へは行かないことにしましょうよ。", "short_explanation": "Indicates making a decision or choice about something.", "translation": "Let's decide not to go to the countryside."}, {"id": 34, "jlpt_level": "N5", "grammar_point": "の (no) - 1: of (indicates possessive)", "sentence": "予定の計画にはなんら変更はありません。", "short_explanation": "Indicates possession or relationship between two nouns, like 'of' or apostrophe-s in English.", "translation": "There are no changes to the planned schedule."}, {"id": 35, "jlpt_level": "N5", "grammar_point": "の (no) – 2: Verb nominalizer", "sentence": "わたしたちが捕まるのも時間の問題だわ！", "short_explanation": "Turns a verb into a noun, like adding '-ing' in English.", "translation": "It's only a matter of time before we get caught!"}, {"id": 36, "jlpt_level": "N5", "grammar_point": "ので (node): because of, the reason is that", "sentence": "少し仮眠を取りますので、状況が変化したら起こしてください。", "short_explanation": "Indicates a reason or cause, often used for objective or polite explanations.", "translation": "I will take a short nap, so please wake me up if the situation changes."}, {"id": 37, "jlpt_level": "N5", "grammar_point": "のがじょうず (no ga jouzu): to be good at", "sentence": "教えるのが上手な人は、どんな人？", "short_explanation": "Indicates someone is skilled or good at doing a specific action.", "translation": "What kind of person is good at teaching?"}, {"id": 38, "jlpt_level": "N5", "grammar_point": "のがへた (no ga heta): to be bad at", "sentence": "お酒を飲むのが下手なのです。", "short_explanation": "Indicates someone is not skilled or poor at doing something.", "translation": "I am bad at drinking alcohol."}, {"id": 39, "jlpt_level": "N5", "grammar_point": "のがすき (no ga suki): to love doing something", "sentence": "妻は不平を言うのが好き。", "short_explanation": "Expresses liking or loving an activity, attaching 'no ga suki' to a verb's plain form.", "translation": "My wife likes to complain."}, {"id": 40, "jlpt_level": "N5", "grammar_point": "すぎる (sugiru): too much", "sentence": "この子達にギャンブルは早すぎる。", "short_explanation": "Means 'too much' or 'excessive,' attached to verb stems or adjective stems.", "translation": "Gambling is too early for these kids."}, {"id": 41, "jlpt_level": "N5", "grammar_point": "たい (tai): want to", "sentence": "あなたの言うことを聞きたくない。", "short_explanation": "Expresses desire to do an action, attached to verb stem.", "translation": "I don't want to listen to what you say."}, {"id": 42, "jlpt_level": "N5", "grammar_point": "たことがある (ta koto ga aru): have done something before", "sentence": "あの人は誰？何度も見たことがあるよ。", "short_explanation": "Indicates past experience of having done something before.", "translation": "Who is that person? I've seen them many times before."}, {"id": 43, "jlpt_level": "N5", "grammar_point": "ている (te iru): to be doing something", "sentence": "何を考えていますか？", "short_explanation": "Indicates an ongoing action or current state, equivalent to present progressive in English.", "translation": "What are you thinking about?"}, {"id": 44, "jlpt_level": "N5", "grammar_point": "てください (te kudasai): please do", "sentence": "ドアをしめてください。", "short_explanation": "Used to politely request someone to do an action, equivalent to 'please do (verb)'.", "translation": "Please close the door."}, {"id": 45, "jlpt_level": "N5", "grammar_point": "てもいい (te mo ii): it’s okay to, can, may", "sentence": "それじゃ、わたし、行ってもいいですか？", "short_explanation": "Indicates permission or that an action is allowed, meaning 'it's okay to' or 'may'.", "translation": "Well then, may I go?"}, {"id": 46, "jlpt_level": "N5", "grammar_point": "てから (te kara): after doing something, since", "sentence": "このクラブを出てから兄は行方不明になったんだ！", "short_explanation": "Indicates that one action occurs after another is completed, meaning 'after doing something'.", "translation": "After leaving this club, my brother went missing!"}, {"id": 47, "jlpt_level": "N5", "grammar_point": "てはいけない (te wa ikenai): may not, must not", "sentence": "あの男には逆らってはいけないと思う。", "short_explanation": "Expresses prohibition, meaning 'must not' or 'may not' do something.", "translation": "I think you must not defy that man."}, {"id": 48, "jlpt_level": "N5", "grammar_point": "と (to) - 1: and, with", "sentence": "若い二人は目と目を見交わした。", "short_explanation": "Particle 'と' connects nouns meaning 'and' or indicates accompaniment 'with'.", "translation": "The young couple exchanged glances with each other."}, {"id": 49, "jlpt_level": "N5", "grammar_point": "つもり (tsumori): plan on doing something", "sentence": "国へ帰ったら、会社をつくるつもりだ。", "short_explanation": "Expresses intention or plan to do something, similar to 'intend to' or 'plan to'.", "translation": "I plan to start a company when I return to my country."}, {"id": 50, "jlpt_level": "N5", "grammar_point": "や (ya): and", "sentence": "私はずっと、レジャーや観光や旅行にとても関心がありました。", "short_explanation": "Particle 'ya' lists multiple items as examples, implying there are others not mentioned.", "translation": "I have always been very interested in leisure, sightseeing, travel, and so on."}, {"id": 51, "jlpt_level": "N5", "grammar_point": "より~ほうが ~ (yori~ hou ga): more than", "sentence": "女より男のほうが飽きやすいものだ。", "short_explanation": "Indicates that one thing is more than another in comparison.", "translation": "Men are more prone to boredom than women."}, {"id": 52, "jlpt_level": "N4", "grammar_point": "あまり～ない (amari~nai): not very, not much", "sentence": "今度の一件については、どうもあまり自信はない。", "short_explanation": "Used with negative verbs to mean 'not very' or 'not much', indicating a lack of degree or frequency.", "translation": "I'm not very confident about this matter."}, {"id": 53, "jlpt_level": "N4", "grammar_point": "あとで (ato de): after, later", "sentence": "私は会社を辞めたあとで、彼からの連絡もめっきり減っていた。", "short_explanation": "Indicates that one action occurs after another action or time.", "translation": "After I quit the company, his contact with me also noticeably decreased."}, {"id": 54, "jlpt_level": "N4", "grammar_point": "ば (ba): if… then", "sentence": "人は死ねば、皮膚しか身につけていない。", "short_explanation": "Indicates a conditional 'if... then' relationship, where the result occurs if the condition is met.", "translation": "When a person dies, they only have their skin."}, {"id": 55, "jlpt_level": "N4", "grammar_point": "場合は (baai wa): in the event of", "sentence": "頭部の外傷の場合、最初の二十四時間は注意が必要です。", "short_explanation": "Means 'in the case of' or 'if', used to describe a condition or situation.", "translation": "In the event of a head injury, caution is necessary for the first 24 hours."}, {"id": 56, "jlpt_level": "N4", "grammar_point": "だけで (dake de): just by", "sentence": "安定した収入を得るだけでは満足できなかった。", "short_explanation": "Indicates that doing just one thing is sufficient to achieve a result.", "translation": "I couldn't be satisfied just by obtaining a stable income."}, {"id": 57, "jlpt_level": "N4", "grammar_point": "だす (dasu): to suddenly begin, to suddenly appear", "sentence": "彼の話を聞いて、つい笑い出してしまった。", "short_explanation": "Indicates the sudden start of an action or appearance of a state.", "translation": "Upon hearing his story, I couldn't help but suddenly start laughing."}, {"id": 58, "jlpt_level": "N4", "grammar_point": "でも (demo): or something", "sentence": "何か暖かいものでも飲む？", "short_explanation": "Indicates 'or something like that' to give a casual example or suggestion.", "translation": "Would you like to drink something warm or something?"}, {"id": 59, "jlpt_level": "N4", "grammar_point": "でございます (de gozaimasu): to be (honorific)", "sentence": "ほんとに冬の間は、ここはおそろしいほど閑静なんでございますのよ。", "short_explanation": "Polite, humble form of です, used in formal speech to show respect or humility.", "translation": "Really, during winter, this place is terribly quiet."}, {"id": 60, "jlpt_level": "N4", "grammar_point": "がる (garu): to show signs of, to feel", "sentence": "手に入れるのが難しいものほど、人は欲しがるのだ。", "short_explanation": "Indicates that someone shows signs of feeling or acting a certain way, based on external observation.", "translation": "The harder something is to obtain, the more people want it."}, {"id": 61, "jlpt_level": "N4", "grammar_point": "がする (ga suru): smell, hear, taste", "sentence": "背後で重厚なドアが閉じる音がした。", "short_explanation": "Indicates perception of a smell, sound, taste, or feeling, often with 'ga' marking the sensory input.", "translation": "I heard the sound of a heavy door closing behind me."}, {"id": 62, "jlpt_level": "N4", "grammar_point": "ごろ (goro): around, about", "sentence": "オフィスには八時頃行き、電話をかけたり受けたりし始めます。", "short_explanation": "Indicates an approximate time or period, like 'around' or 'about' in English.", "translation": "I go to the office around 8 o'clock and start making and receiving phone calls."}, {"id": 63, "jlpt_level": "N4", "grammar_point": "ございます (gozaimasu): to be, to exist (honorific)", "sentence": "ここに私の出生証明書がございます。", "short_explanation": "Honorific form of 'arimasu' meaning 'to be/exist', used to show respect.", "translation": "Here is my birth certificate."}, {"id": 64, "jlpt_level": "N4", "grammar_point": "始める (hajimeru): to start, to begin to", "sentence": "私はとても暑く感じ始めました。", "short_explanation": "Indicates the beginning of an action or state, attached to the stem of a verb.", "translation": "I started to feel very hot."}, {"id": 65, "jlpt_level": "N4", "grammar_point": "はずだ (hazu da): it must be, it should be", "sentence": "容疑者に裁判を拒否することはできないはずです。", "short_explanation": "Expresses strong expectation or assumption based on logical reasoning or known facts.", "translation": "It should not be possible for the suspect to refuse the trial."}, {"id": 66, "jlpt_level": "N4", "grammar_point": "はずがない (hazu ga nai): cannot be", "sentence": "ご主人の悪口を奥さんに聞かせていいはずがないんだ。", "short_explanation": "Expresses strong conviction that something is impossible or cannot be true.", "translation": "It cannot be right to let the wife hear her husband's insults."}, {"id": 67, "jlpt_level": "N4", "grammar_point": "必要: need, necessary", "sentence": "私たちには、皆が公平に扱われるための、明確な一連の規則が必要だ。", "short_explanation": "Indicates something is necessary or required, often used with が or は.", "translation": "We need a clear set of rules so that everyone is treated fairly."}, {"id": 68, "jlpt_level": "N4", "grammar_point": "必要がある (hitsuyou ga aru): it is necessary to", "sentence": "もう一度お会いする必要があります。", "short_explanation": "Indicates necessity or obligation to do something, equivalent to 'must' or 'have to'.", "translation": "It is necessary to meet you again."}, {"id": 69, "jlpt_level": "N4", "grammar_point": "欲しい (hoshii): to want something, to be in need of", "sentence": "イエスという答がほしい。あなたはこの仕事の最適任者だ。", "short_explanation": "Used to express desire for a noun; indicates wanting or needing something.", "translation": "I want a yes answer. You are the best person for this job."}, {"id": 70, "jlpt_level": "N4", "grammar_point": "いらっしゃる (irassharu): to be, to come, to go (honorific)", "sentence": "またいらっしゃってください。", "short_explanation": "Honorific verb for 'to be', 'to come', or 'to go', used to show respect to the subject.", "translation": "Please come again."}, {"id": 71, "jlpt_level": "N4", "grammar_point": "いたす (itasu): to do (honorific)", "sentence": "お邪魔いたしまして申しわけございませんでした。", "short_explanation": "Humble form of 'suru' (to do), used to show respect by lowering oneself.", "translation": "I am sorry for having intruded."}, {"id": 72, "jlpt_level": "N4", "grammar_point": "じゃないか (janai ka): isn’t it", "sentence": "隠れるところがないじゃないか！", "short_explanation": "Expresses rhetorical question or surprise, meaning 'isn't it?' or 'right?'", "translation": "There's no place to hide, is there!"}, {"id": 73, "jlpt_level": "N4", "grammar_point": "かどうか (ka dou ka): whether or not", "sentence": "自分が本当に正しいことをしているのかどうか、確信がもてなくなることがある。", "short_explanation": "Means 'whether or not', used to express uncertainty or choice between two alternatives.", "translation": "There are times when I lose confidence in whether or not I am truly doing the right thing."}, {"id": 74, "jlpt_level": "N4", "grammar_point": "かい (kai): [turns a sentence into a yes/no question]", "sentence": "それで、学校はどうだった？友だちはできたかい？", "short_explanation": "Adds かい to a sentence to form a casual yes/no question.", "translation": "So, how was school? Did you make friends?"}, {"id": 75, "jlpt_level": "N4", "grammar_point": "かもしれない (kamoshirenai): might, maybe", "sentence": "私は本当はあなたに会わなかったほうがよかったのかもしれない。", "short_explanation": "Expresses uncertainty or possibility, meaning 'might' or 'maybe'.", "translation": "Maybe it would have been better if I had never met you."}, {"id": 76, "jlpt_level": "N4", "grammar_point": "かな (kana): I wonder", "sentence": "あなたはわたしといっしょに旅行するのはいやなのかな？", "short_explanation": "Expresses uncertainty or wonder, like 'I wonder' in English.", "translation": "I wonder if you don't want to travel with me?"}, {"id": 77, "jlpt_level": "N4", "grammar_point": "かた (kata): how to", "sentence": "その初めて投票したときのやり方は、誇れるようなものではありません。", "short_explanation": "Indicates the method or way of doing an action, meaning 'how to' do something.", "translation": "The way I voted for the first time is not something to be proud of."}, {"id": 78, "jlpt_level": "N4", "grammar_point": "かしら (kashira): I wonder", "sentence": "今度の土曜日に電話かけていいかしら？", "short_explanation": "Expresses uncertainty or a question, often used by females to mean 'I wonder' or 'I wonder if'.", "translation": "I wonder if it's okay to call this Saturday?"}, {"id": 79, "jlpt_level": "N4", "grammar_point": "こと (koto): Verb nominalizer", "sentence": "彼は休息に多くの時間をあたえることになれていない。", "short_explanation": "Nominalizes a verb, turning it into a noun phrase to express an action or state.", "translation": "He is not used to giving a lot of time to rest."}, {"id": 80, "jlpt_level": "N4", "grammar_point": "ことができる (koto ga dekiru): can, be able to", "sentence": "彼女はどうかこうか字は読めたが、書くことができなかった。", "short_explanation": "Indicates ability or possibility to do something, equivalent to 'can' or 'be able to'.", "translation": "She could somehow read the characters, but couldn't write them."}, {"id": 81, "jlpt_level": "N4", "grammar_point": "までに (made ni): by, by the time", "sentence": "僕はこれまでに何度か彼女に嘘をついた。", "short_explanation": "Indicates a deadline or time limit by which an action must be completed.", "translation": "I have lied to her several times up to now."}, {"id": 82, "jlpt_level": "N4", "grammar_point": "みたい (mitai): like, sort of", "sentence": "あまり頭のいい人物じゃなかったけど、かなり儲けているみたいだった。", "short_explanation": "Indicates resemblance or appearance based on observation, like 'seems like' or 'looks like'.", "translation": "He wasn't a very smart person, but he seemed to be making a lot of money."}, {"id": 83, "jlpt_level": "N4", "grammar_point": "みたいに/みたいな (mitai ni/mitai na): like, similar to", "sentence": "彼女の心は氷みたいに冷たい。", "short_explanation": "Indicates something is similar to or like something else, used with nouns.", "translation": "Her heart is as cold as ice."}, {"id": 84, "jlpt_level": "N4", "grammar_point": "など (nado): such as, things like", "sentence": "これ以上人生から学ぶことなどないと考えていた。", "short_explanation": "Indicates examples or implies 'and so on', often used to downplay or generalize items in a list.", "translation": "I thought there was nothing more to learn from life."}, {"id": 85, "jlpt_level": "N4", "grammar_point": "ながら (nagara): while, during, as", "sentence": "子どものころは誰もがバービー人形で遊びながら育ちますよね。", "short_explanation": "Indicates two actions occurring simultaneously, with the main action following 'nagara'.", "translation": "When we were children, everyone grows up playing with Barbie dolls, right?"}, {"id": 86, "jlpt_level": "N4", "grammar_point": "ないで (naide): without doing, don’t", "sentence": "僕たちは誰にも気付かれないで村を出てきたんだ。", "short_explanation": "Indicates doing something without performing a preceding action, or a polite negative request.", "translation": "We left the village without being noticed by anyone."}, {"id": 87, "jlpt_level": "N4", "grammar_point": "なければいけない/なければならない (nakereba ikenai/nakereba naranai): must, have to", "sentence": "だが私は行かなければならない。私を引きとめようとしても無駄だからね。", "short_explanation": "Expresses obligation or necessity, meaning 'must' or 'have to' do something.", "translation": "But I must go. It's useless to try to stop me."}, {"id": 88, "jlpt_level": "N4", "grammar_point": "なくてはいけない/なくてはならない (nakutewa ikenai/nakutewa naranai): must, have to", "sentence": "報告書を書き直さなくてはならない。", "short_explanation": "Expresses necessity or obligation, meaning 'must do' or 'have to do'.", "translation": "I must rewrite the report."}, {"id": 89, "jlpt_level": "N4", "grammar_point": "なくてもいい (nakute mo ii): don’t have to", "sentence": "もうこの問題については考えなくていい。", "short_explanation": "Indicates something is not necessary or optional; 'don't have to' do something.", "translation": "You don't have to think about this problem anymore."}, {"id": 90, "jlpt_level": "N4", "grammar_point": "なら (nara): if, in case, as for", "sentence": "彼女を殺したいのなら、僕も殺しなさい！", "short_explanation": "Indicates a conditional 'if' or topic 'as for', often based on prior context or assumption.", "translation": "If you want to kill her, then kill me too!"}, {"id": 91, "jlpt_level": "N4", "grammar_point": "なさい (nasai): command (order somebody to do something)", "sentence": "元気を出しなさい。来週には京都に連れていってやろう。", "short_explanation": "なさい is a command form used to order someone to do something, often by a superior.", "translation": "Cheer up. I'll take you to Kyoto next week."}, {"id": 92, "jlpt_level": "N4", "grammar_point": "なさる (nasaru): to do (honorific)", "sentence": "あまり期待なさらないでくださいよ。", "short_explanation": "Honorific form of 'suru' (to do), used to show respect to the person performing the action.", "translation": "Please don't expect too much."}, {"id": 93, "jlpt_level": "N4", "grammar_point": "に気がつく (ni ki ga tsuku): to notice, to realize", "sentence": "そのとき彼は、彼女が泣いているのに気がついた。", "short_explanation": "Indicates noticing or becoming aware of something, often suddenly or after not realizing before.", "translation": "At that time, he noticed that she was crying."}, {"id": 94, "jlpt_level": "N4", "grammar_point": "にくい (nikui): difficult, hard to", "sentence": "悪い知らせって言いにくい。", "short_explanation": "Indicates an action is difficult or hard to do, attached to the verb stem.", "translation": "It's hard to say bad news."}, {"id": 95, "jlpt_level": "N4", "grammar_point": "に見える (ni mieru): to look, to seem", "sentence": "私には、彼は少し腹を立てているように見えた。", "short_explanation": "Indicates how something appears or seems based on visual observation.", "translation": "To me, he looked a little angry."}, {"id": 96, "jlpt_level": "N4", "grammar_point": "のなかで (no naka de): in, among", "sentence": "彼は俺に人生の中で一番の親友だ。", "short_explanation": "Indicates 'in' or 'among' a group or category, often used to specify the scope of comparison.", "translation": "He is my best friend in life."}, {"id": 97, "jlpt_level": "N4", "grammar_point": "のに(noni) - 1: in order to", "sentence": "妹は顔を洗うのにすごく長い時間がかかります。", "short_explanation": "Indicates purpose or necessity for an action, meaning 'in order to' or 'for the purpose of.'", "translation": "It takes my little sister a very long time to wash her face."}, {"id": 98, "jlpt_level": "N4", "grammar_point": "のに (noni) - 2: although, in spite of", "sentence": "冬が近づいているのに、食糧がない。", "short_explanation": "Indicates a contradiction between two clauses, meaning 'although' or 'in spite of'.", "translation": "Although winter is approaching, there is no food."}, {"id": 99, "jlpt_level": "N4", "grammar_point": "のように / のような (no you ni/no you na): like, similar to", "sentence": "彼の眼は錐のように、冷たく、そして鋭かった。", "short_explanation": "Indicates something is similar to or resembles something else, like 'like' or 'similar to'.", "translation": "His eyes were cold and sharp, like a drill."}, {"id": 100, "jlpt_level": "N4", "grammar_point": "お～ください (o~kudasai): please do (honorific)", "sentence": "ドアが閉まります。ご注意ください。", "short_explanation": "Honorific form used to politely ask someone to do something, often in public announcements or formal contexts.", "translation": "The door is closing. Please be careful."}, {"id": 101, "jlpt_level": "N4", "grammar_point": "お～になる (o~ni naru): to do (honorific)", "sentence": "いつ招待状をお出しになりますか？", "short_explanation": "Honorific form to show respect for someone's action, replacing ます form with お+verb stem+になる.", "translation": "When will you send the invitation?"}, {"id": 102, "jlpt_level": "N4", "grammar_point": "おきに (oki ni): repeated at intervals, every", "sentence": "彼は一週間おきに問題を起こす生徒だ。", "short_explanation": "Indicates an action occurs at regular intervals of time or distance.", "translation": "He is a student who causes trouble every week."}, {"id": 103, "jlpt_level": "N4", "grammar_point": "終わる (owaru): to finish, to end", "sentence": "話し終わると、記者たちの質問が殺到した。", "short_explanation": "終わる means 'to finish' or 'to end', indicating the completion of an action or event.", "translation": "When I finished speaking, reporters' questions flooded in."}, {"id": 104, "jlpt_level": "N4", "grammar_point": "られる (rareru) - 1: to be able to do something", "sentence": "彼が酒に溺れて自殺するなんて信じられなかった。", "short_explanation": "Indicates ability to do something, equivalent to 'can' or 'be able to'.", "translation": "I couldn't believe that he drowned himself in alcohol and committed suicide."}, {"id": 105, "jlpt_level": "N4", "grammar_point": "られる (rareru) - 2 (owaru): passive voice", "sentence": "彼に無視されるのがこんなにつらいとは思わなかった。", "short_explanation": "Indicates that the subject receives an action from someone, often implying a negative impact.", "translation": "I didn't expect being ignored by him would be this painful."}, {"id": 106, "jlpt_level": "N4", "grammar_point": "らしい (rashii): seems like", "sentence": "どうも最近、物覚えがわるくなっているらしい。", "short_explanation": "Indicates hearsay or conjecture based on observed evidence, meaning 'seems like' or 'I hear that'.", "translation": "It seems that my memory has been getting worse lately."}, {"id": 107, "jlpt_level": "N4", "grammar_point": "さ (sa): [nominalizer for adjectives]", "sentence": "あなたの強さは、どこから来ているのでしょうか？", "short_explanation": "Converts adjectives into nouns, like 'height' from 'tall' or 'strength' from 'strong'.", "translation": "Where does your strength come from?"}, {"id": 108, "jlpt_level": "N4", "grammar_point": "させる (saseru): to make/let somebody do something", "sentence": "なぜかその人たちは、わたしを不安な気持にさせた。", "short_explanation": "Causative form meaning to make or let someone do something.", "translation": "For some reason, those people made me feel uneasy."}, {"id": 109, "jlpt_level": "N4", "grammar_point": "させられる (saserareru): to be made to do something", "sentence": "母は家計を支えるために高校をやめさせられた。", "short_explanation": "Indicates someone is forced or made to do something against their will.", "translation": "I was forced to quit high school to support my family."}, {"id": 110, "jlpt_level": "N4", "grammar_point": "さすが (sasuga): as one would expect", "sentence": "さすがにこういうところには住みたくないな…", "short_explanation": "Expresses that something is typical or expected, often with admiration or resignation.", "translation": "As expected, I wouldn't want to live in a place like this..."}, {"id": 111, "jlpt_level": "N4", "grammar_point": "し～し (shi~shi): and", "sentence": "彼は勉強も運動もできるし背も高いし…", "short_explanation": "Lists multiple reasons or examples, implying 'and what's more' or 'not only... but also'.", "translation": "He is good at both studying and sports, and he's tall too..."}, {"id": 112, "jlpt_level": "N4", "grammar_point": "しか～ない (shika~nai): only, nothing but", "sentence": "正しくやれるチャンスは１回しかないんだ。", "short_explanation": "Indicates 'only' or 'nothing but', emphasizing limitation by combining with negative verb.", "translation": "There is only one chance to do it right."}, {"id": 113, "jlpt_level": "N4", "grammar_point": "そんなに (sonna ni): so, so much, like that", "sentence": "わたしのことがそんなに大切？", "short_explanation": "Indicates degree or manner, meaning 'so much' or 'like that', often used in negative or question forms.", "translation": "Am I so important to you?"}, {"id": 114, "jlpt_level": "N4", "grammar_point": "それでも (sore demo): but still, and yet", "sentence": "彼女は食べることに集中しようとした。それでも手は震え、顔は怒りで火照りはじめた。", "short_explanation": "Means 'but still' or 'and yet', indicating a contrast where something happens despite a previous statement.", "translation": "She tried to focus on eating. But still, her hands trembled and her face began to flush with anger."}, {"id": 115, "jlpt_level": "N4", "grammar_point": "そうに/そうな (sou ni/sou na): seem, look like", "sentence": "ヒカルだけがかなり快活そうな様子をしていました。", "short_explanation": "Used after verb stems or adjectives to indicate appearance or seeming based on observation.", "translation": "Only Hikaru looked quite cheerful."}, {"id": 116, "jlpt_level": "N4", "grammar_point": "そうだ (sou da) - 1: I heard that, it is said that", "sentence": "うわさでは、橋本がついに職を得たそうだ。", "short_explanation": "Expresses hearsay or reported information, meaning 'I heard that' or 'it is said that'.", "translation": "Rumor has it that Hashimoto finally got a job."}, {"id": 117, "jlpt_level": "N4", "grammar_point": "そうだ (sou da) - 2: look like, seem", "sentence": "彼はいまにも涙をこぼしそうだった。", "short_explanation": "Indicates an appearance or impression based on visual observation, like 'looks like' or 'seems'.", "translation": "He looked as if he was about to cry at any moment."}, {"id": 118, "jlpt_level": "N4", "grammar_point": "たばかり (ta bakari): just did, something just happened", "sentence": "その話を聞いていたら、うちの娘が生まれたばかりのころを思い出した。", "short_explanation": "Indicates that an action has just been completed or a state has just occurred.", "translation": "Listening to that story, I remembered the time when my daughter was just born."}, {"id": 119, "jlpt_level": "N4", "grammar_point": "たがる (tagaru): to want to", "sentence": "三浦さんは私の演説に目を通したがっていた。", "short_explanation": "Indicates that someone else wants to do something, based on observable signs.", "translation": "Miura wanted to look over my speech."}, {"id": 120, "jlpt_level": "N4", "grammar_point": "たら (tara): if, after, when", "sentence": "もしあなたがお亡くなりになったら、私も死にます。", "short_explanation": "Indicates a conditional 'if', 'when', or 'after' something happens, often implying a cause-effect relationship.", "translation": "If you die, I will die too."}, {"id": 121, "jlpt_level": "N4", "grammar_point": "たらどう (tara dou): why don’t you?", "sentence": "それはネットで調べたらどう？", "short_explanation": "Used to suggest or recommend an action, meaning 'why don’t you...?'", "translation": "Why don’t you look that up on the internet?"}, {"id": 122, "jlpt_level": "N4", "grammar_point": "たり～たり (tari~tari): do such things like", "sentence": "友達と一緒にご飯を食べたり話したりするのが楽しかったです。", "short_explanation": "Lists examples of actions or states, implying 'do such things like...' without being exhaustive.", "translation": "It was fun doing things like eating and talking with friends."}, {"id": 123, "jlpt_level": "N4", "grammar_point": "たところ (ta tokoro): just finished doing, was just doing", "sentence": "高木が、書斎のガラス戸から庭へ出たところだ。", "short_explanation": "Indicates an action has just been completed or was just happening.", "translation": "Takagi has just gone out into the garden from the glass door of the study."}, {"id": 124, "jlpt_level": "N4", "grammar_point": "てあげる (te ageru): to do something for someone", "sentence": "タクシーを拾ってあげようか？", "short_explanation": "Indicates doing a favor or action for someone else, showing kindness or assistance.", "translation": "Shall I hail a taxi for you?"}, {"id": 125, "jlpt_level": "N4", "grammar_point": "てある (te aru): something is/has been done", "sentence": "何かが骨のなかに差し込んである。", "short_explanation": "Indicates a state resulting from a purposeful action, often with an implied agent.", "translation": "Something has been stuck into the bone."}, {"id": 126, "jlpt_level": "N4", "grammar_point": "てほしい (te hoshii): I need you to", "sentence": "向こうで待っていてほしい。あとから私も行く。", "short_explanation": "Expresses a desire for someone else to do an action, like 'I want you to...'.", "translation": "I need you to wait over there. I'll go later too."}, {"id": 127, "jlpt_level": "N4", "grammar_point": "ていく (te iku): to go on, to start", "sentence": "彼はもう一度詫びを述べて、別のドアから出て行った。", "short_explanation": "Indicates an action that continues or progresses away from the speaker.", "translation": "He apologized once more and went out through another door."}, {"id": 128, "jlpt_level": "N4", "grammar_point": "ているところ (teiru tokoro): in the process of doing", "sentence": "どうぞお楽に、ちょうどお茶を淹れているところです。", "short_explanation": "Indicates an action is in progress, equivalent to 'in the middle of doing' something.", "translation": "Please make yourself comfortable; I'm just in the middle of brewing tea."}, {"id": 129, "jlpt_level": "N4", "grammar_point": "ていた (te ita): was doing something", "sentence": "真純の眼はじっと地面を見つめていた。", "short_explanation": "Indicates an ongoing action or state in the past, meaning 'was doing' or 'had been doing'.", "translation": "Masumi's eyes were staring intently at the ground."}, {"id": 130, "jlpt_level": "N4", "grammar_point": "ていただけませんか (te itadakemasen ka): could you please", "sentence": "手紙ではとても説明できません。どうかお帰りになっていただけませんか？", "short_explanation": "A polite request form meaning 'could you please do (something) for me?'", "translation": "I can't explain it well in a letter. Could you please come back?"}, {"id": 131, "jlpt_level": "N4", "grammar_point": "てくれる (te kureru): to do something for me or somebody's sake", "sentence": "僕たちのためにいろいろ助けてくれたことは忘れない。", "short_explanation": "Indicates someone does an action for the speaker or their in-group, showing gratitude.", "translation": "I won't forget how you helped us in many ways."}, {"id": 132, "jlpt_level": "N4", "grammar_point": "てくる (te kuru): to come to, to become, to continue", "sentence": "喉が渇いたから飲み物を買ってくる。", "short_explanation": "Indicates an action moving toward the speaker, a change starting, or a continuing process.", "translation": "I'm thirsty, so I'll go buy a drink and come back."}, {"id": 133, "jlpt_level": "N4", "grammar_point": "てみる (te miru): to try to", "sentence": "ロック・クライミングにも挑戦してみたいです。", "short_explanation": "Indicates trying an action to see what happens or how it goes.", "translation": "I also want to try rock climbing."}, {"id": 134, "jlpt_level": "N4", "grammar_point": "ても (temo): even if, even though", "sentence": "自分が疲れていても、ひもじくても、わたしを看護して、食べさせてくれたわ。", "short_explanation": "Indicates 'even if' or 'even though', showing that the result is contrary to the condition.", "translation": "Even if you were tired or hungry, you still nursed me and fed me."}, {"id": 135, "jlpt_level": "N4", "grammar_point": "てもらう (te morau): to get somebody to do something", "sentence": "あなたに認めてもらいたいんです。わたしとエミリーとの結婚を。", "short_explanation": "Indicates receiving a favor; the subject gets someone to perform an action for them.", "translation": "I want you to acknowledge my marriage with Emily."}, {"id": 136, "jlpt_level": "N4", "grammar_point": "ておく (te oku): to do something in advance", "sentence": "この恐ろしい秘密は、われわれ二人の胸中深く秘めておこう。", "short_explanation": "Indicates doing an action in preparation or for future convenience.", "translation": "Let's keep this terrible secret deep in our hearts."}, {"id": 137, "jlpt_level": "N4", "grammar_point": "てしまう (te shimau): to do something by accident, to finish completely", "sentence": "いったい誰がこの致命的な秘密をあの子に知らせてしまったのか、私どもにはわかりませんでした。", "short_explanation": "Indicates an action is completed, often with regret, accident, or finality.", "translation": "We had no idea who on earth had accidentally told that child this fatal secret."}, {"id": 138, "jlpt_level": "N4", "grammar_point": "てすみません (te sumimasen): I’m sorry for", "sentence": "この件についてだまっていてすみません。", "short_explanation": "Used to apologize for an action, connecting the verb in te-form with 'sumimasen' to express regret.", "translation": "I'm sorry for staying silent about this matter."}, {"id": 139, "jlpt_level": "N4", "grammar_point": "てよかった (te yokatta): I’m glad that", "sentence": "あなたが早めに席を予約してくれてよかった。", "short_explanation": "Expresses relief or happiness that something happened or was done.", "translation": "I'm glad you reserved the seat early."}, {"id": 140, "jlpt_level": "N4", "grammar_point": "と (to): if, when", "sentence": "この手紙を朗読すると、詩的に聞こえませんか？", "short_explanation": "Indicates a natural or inevitable result when one action or condition occurs.", "translation": "When you read this letter aloud, doesn't it sound poetic?"}, {"id": 141, "jlpt_level": "N4", "grammar_point": "と～と、どちらが (to~to, dochira ga): which one", "sentence": "日本語と英語とどちらが難しいですか。", "short_explanation": "Used to ask which of two items is more something.", "translation": "Which is more difficult, Japanese or English?"}, {"id": 142, "jlpt_level": "N4", "grammar_point": "ということ (to iu koto): [changes a sentence or phrase into a Noun]", "sentence": "彼が金持だということが一般に知れ渡る。", "short_explanation": "Nominalizes a sentence or phrase, turning it into a noun clause meaning 'the fact that...' or 'that...'.", "translation": "The fact that he is rich became widely known."}, {"id": 143, "jlpt_level": "N4", "grammar_point": "と言ってもいい (to itte mo ii): you could say, you might say", "sentence": "そんな事は、ほとんど不可能といってもいいが…", "short_explanation": "Indicates that something can be said or considered as such, often with slight reservation.", "translation": "You could say that such a thing is almost impossible, but..."}, {"id": 144, "jlpt_level": "N4", "grammar_point": "と言われている (to iwarete iru): it is said that…", "sentence": "ベーカー通りにあるその古い屋敷には、よく幽霊が出ると言われている。", "short_explanation": "Expresses a general belief or common saying; 'it is said that...'", "translation": "It is said that ghosts often appear in that old mansion on Baker Street."}, {"id": 145, "jlpt_level": "N4", "grammar_point": "とか～とか (toka ~ toka): among other things, such as", "sentence": "右とか左とかっていうのはよくわからなくなるもんですよ。", "short_explanation": "Lists examples among other things, implying there are more not mentioned.", "translation": "Things like right and left are easy to get confused about."}, {"id": 146, "jlpt_level": "N4", "grammar_point": "とき (toki): when, at the time", "sentence": "じつは私もここに初めて入ったときには、同じことを考えましたよ。", "short_explanation": "Indicates the time or moment when an action or state occurs, meaning 'when' or 'at the time'.", "translation": "Actually, I thought the same thing when I first entered here too."}, {"id": 147, "jlpt_level": "N4", "grammar_point": "と聞いた (to kiita): I heard that", "sentence": "たしかあなたはずっと独身だと聞きましたが…", "short_explanation": "Indicates hearsay, meaning 'I heard that' based on information from others.", "translation": "I heard that you've been single for a long time, but..."}, {"id": 148, "jlpt_level": "N4", "grammar_point": "ところ (tokoro): about to, on the verge of", "sentence": "私たちはもうすぐ到着するところです。", "short_explanation": "Indicates an action is about to happen or is on the verge of occurring.", "translation": "We are about to arrive soon."}, {"id": 149, "jlpt_level": "N4", "grammar_point": "と見える (to mieru): it seems that", "sentence": "彼女のひどい仕打ちは、よっぽど深い印象をあなたの心にあたえたとみえるわ！", "short_explanation": "Indicates the speaker's inference or judgment based on observable evidence, meaning 'it seems that' or 'it appears that'.", "translation": "It seems that her terrible treatment left a very deep impression on your heart!"}, {"id": 150, "jlpt_level": "N4", "grammar_point": "と思う (to omou): to think", "sentence": "オリンピックの後、いろんなことがぐんとよくなったと思う。", "short_explanation": "Expresses the speaker's opinion or belief, meaning 'I think that...'.", "translation": "I think that after the Olympics, various things got much better."}, {"id": 151, "jlpt_level": "N4", "grammar_point": "続ける (tsuzukeru): to continue", "sentence": "銃弾が重いドアノブをなおもたたきつづけている。", "short_explanation": "Indicates that an action or state continues over time, often with persistence.", "translation": "The bullets continue to strike the heavy doorknob."}, {"id": 152, "jlpt_level": "N4", "grammar_point": "やすい (yasui): easy to, likely to", "sentence": "お互いへの信頼があれば、取引はずっと進めやすくなる。", "short_explanation": "Attach to verb stem to mean 'easy to do' or 'likely to happen'.", "translation": "If there is mutual trust, business transactions become much easier to proceed."}, {"id": 153, "jlpt_level": "N4", "grammar_point": "より (yori): more than", "sentence": "とても内気だったけど、芯はわたしよりずっと強い人だった。", "short_explanation": "Indicates comparison, meaning 'more than' or 'than'.", "translation": "She was very shy, but her core was much stronger than mine."}, {"id": 154, "jlpt_level": "N4", "grammar_point": "予定だ (yotei da): plan to, intend to", "sentence": "今日、午前八時に飛行機で長野を出発する予定だ。", "short_explanation": "Indicates a plan or intention to do something.", "translation": "I plan to depart from Nagano by plane at 8 AM today."}, {"id": 155, "jlpt_level": "N4", "grammar_point": "ようだ (you da): it seems that, it appears that", "sentence": "いまの彼は審判を待つ罪人のようだ。", "short_explanation": "Expresses conjecture or resemblance based on speaker's observation or feeling.", "translation": "He now seems like a sinner awaiting judgment."}, {"id": 156, "jlpt_level": "N4", "grammar_point": "ように/ような (you ni/you na): as, like", "sentence": "栄介は逃げるようにして町を出ていった。", "short_explanation": "Indicates similarity or manner, meaning 'like' or 'as if' something is the case.", "translation": "Eisuke left town as if fleeing."}, {"id": 157, "jlpt_level": "N4", "grammar_point": "ようになる (you ni naru): to reach the point that", "sentence": "最近では、不愉快な思いはうまく頭から締め出せるようになった。", "short_explanation": "Indicates a change or development to a new state or ability, meaning 'to come to do' or 'reach the point where'.", "translation": "Lately, I've reached the point where I can effectively shut out unpleasant thoughts from my mind."}, {"id": 158, "jlpt_level": "N4", "grammar_point": "ようにする (you ni suru): to try to, to make sure that", "sentence": "このプロジェクト、私に担当させてください。期待に沿うようにします。", "short_explanation": "Expresses effort or intention to ensure a certain state or action is achieved.", "translation": "Please let me take charge of this project. I'll make sure to meet your expectations."}, {"id": 159, "jlpt_level": "N4", "grammar_point": "ようと思う (you to omou): I think I will… (I’m thinking of doing…)", "sentence": "明日、ランチのあとで天文学の本を買おうと思う。", "short_explanation": "Expresses the speaker's intention or plan to do something, meaning 'I think I will...'.", "translation": "I think I will buy an astronomy book after lunch tomorrow."}, {"id": 160, "jlpt_level": "N4", "grammar_point": "全然 (zenzen): (not) at all", "sentence": "ちょっと待ってくれ、ぼくには、そんなことはぜんぜん理解できないよ。", "short_explanation": "Means '(not) at all', used with negative verbs to strongly negate something.", "translation": "Wait a minute, I can't understand that at all."}, {"id": 161, "jlpt_level": "N4", "grammar_point": "火事は住宅地に広がる前に消し止められた。", "sentence": "ねえ、もうその話はやめよう。せっかくここまで来たんだから、もっと明るい話をしよう。", "short_explanation": "Indicates an action was completed before a certain point, using 'before' to show timing.", "translation": "Hey, let's stop talking about that. Since we've come this far, let's talk about something brighter."}, {"id": 162, "jlpt_level": "N3", "grammar_point": "あまり (amari): so much... that", "sentence": "驚きと安堵のあまり、しゃべることも忘れて、僕はできる限りの速さで彼のあとを追っていった。", "short_explanation": "Indicates that something is done to such an extreme degree that a certain result occurs.", "translation": "So much from surprise and relief that I forgot to speak, I followed after him as fast as I could."}, {"id": 163, "jlpt_level": "N3", "grammar_point": "あまりに (amari ni): so much... that, too...", "sentence": "この農場主によると、不法入国者や麻薬密売人はあまりに簡単に国境を越えることができるのです。", "short_explanation": "Indicates that something is excessive to the point of causing a result or consequence.", "translation": "According to this farmer, illegal immigrants and drug traffickers can cross the border too easily."}, {"id": 164, "jlpt_level": "N3", "grammar_point": "ば～ほど (ba ~ hodo): the more... the more", "sentence": "「モナ・リザ」を見れば見るほど、誰もが不思議な心地に陥るものだ。", "short_explanation": "Means 'the more X, the more Y', indicating that as one action increases, the result intensifies.", "translation": "The more you look at the Mona Lisa, the more everyone falls into a mysterious feeling."}, {"id": 165, "jlpt_level": "N3", "grammar_point": "ばいい (ba ii): should, can, it'd be good if", "sentence": "東の方にどれくらい進めばいいのか、きみにはわかってるのかい？", "short_explanation": "Indicates that something is advisable or sufficient; 'it would be good if' or 'should'.", "translation": "Do you know how far we should go east?"}, {"id": 166, "jlpt_level": "N3", "grammar_point": "ばかり (bakari): only, nothing but", "sentence": "タケシはふざけてばかりいるけど、仕事ではプロであり、心の温かい人です。", "short_explanation": "Indicates that someone does nothing but a certain action, often with a sense of excess or limitation.", "translation": "Takeshi is always fooling around, but he's a professional at work and a warm-hearted person."}, {"id": 167, "jlpt_level": "N3", "grammar_point": "ばかりだ (bakari da): continue to", "sentence": "胸に秘めた悲しみと怒りは大きくなるばかりだ。", "short_explanation": "Indicates that something continues to increase or progress in one direction.", "translation": "The sadness and anger hidden in my heart continue to grow."}, {"id": 168, "jlpt_level": "N3", "grammar_point": "ばかりでなく (bakari denaku): not only... but also, as well as", "sentence": "これは市の財政にとって損失であるばかりでなく、市の重要地区に醜い傷を残し、深刻な環境悪化をもたらしていただろう。", "short_explanation": "Means 'not only... but also', used to add another related point or fact.", "translation": "This would have not only been a loss for the city's finances, but also left an ugly scar in an important district and caused serious environmental degradation."}, {"id": 169, "jlpt_level": "N3", "grammar_point": "ばかりに (bakari ni): because, on account of", "sentence": "実力のある女性は、苦境に陥っていることを人に知られたくないばかりに助けを求められないことがあるようだ。", "short_explanation": "Indicates that something happens solely because of a specific reason, often with regret.", "translation": "It seems that capable women sometimes cannot ask for help because they don't want others to know they are in trouble."}, {"id": 170, "jlpt_level": "N3", "grammar_point": "ばよかった (ba yokatta): should have, it would have been better if", "sentence": "君がもっと早くそのことを言ってくれればよかったな。そしたら、途中もっと気をつけたかもしれない。", "short_explanation": "Expresses regret that something was not done, meaning 'should have' or 'it would have been better if'.", "translation": "I wish you had told me that sooner. Then, I might have been more careful along the way."}, {"id": 171, "jlpt_level": "N3", "grammar_point": "べき (beki): must do, should do", "sentence": "こうしたことはずっと前にやるべきだったわね。", "short_explanation": "Indicates obligation or strong recommendation to do something. Means 'should' or 'must'.", "translation": "We should have done this a long time ago."}, {"id": 172, "jlpt_level": "N3", "grammar_point": "べきではない (beki dewa nai): must not do, should not do", "sentence": "本来こんなことを書き送るべきではないだろう。考えてもいけない。", "short_explanation": "Indicates that something should not be done, expressing moral obligation or strong advice against an action.", "translation": "I probably should not be writing and sending something like this. I must not even think about it."}, {"id": 173, "jlpt_level": "N3", "grammar_point": "べつに～ない (betsu ni ~ nai): not really, not particularly", "sentence": "どうせいずれは話しなくちゃならないね。わたしべつに恥かしいことだとは思っていないの。", "short_explanation": "Used with a negative verb to mean 'not particularly' or 'not really', softening a denial or lack of interest.", "translation": "We'll have to talk about it eventually anyway. I don't really think it's embarrassing."}, {"id": 174, "jlpt_level": "N3", "grammar_point": "中 (chuu/juu): during, throughout", "sentence": "しばらくまえ、私の留守中になにか起こったようなことを言っていたね。", "short_explanation": "Indicates 'during' or 'throughout' a period or activity, depending on reading (chuu vs juu).", "translation": "A while ago, you said something seemed to have happened while I was away."}, {"id": 175, "jlpt_level": "N3", "grammar_point": "だけ (dake) – 2: as much as", "sentence": "決戦大会では、一人の候補者が過半数を得るまで、代議員たちが何回でも必要なだけ投票を行います。", "short_explanation": "Indicates doing something to the extent or amount needed or desired.", "translation": "In the final convention, delegates vote as many times as necessary until one candidate obtains a majority."}, {"id": 176, "jlpt_level": "N3", "grammar_point": "だらけ (darake): covered all over in, full of", "sentence": "ばかね、船中を血だらけにしたいとでもいうの？", "short_explanation": "Indicates something is covered or filled with something, often negative or messy.", "translation": "You idiot, are you trying to get the whole ship covered in blood?"}, {"id": 177, "jlpt_level": "N3", "grammar_point": "どころか (dokoro ka): far from, anything but", "sentence": "わたしはほしいものがすべて手に入ると期待するどころか、すべてを失うのを恐れている。", "short_explanation": "Indicates that reality is the opposite of what is expected, meaning 'far from' or 'anything but'.", "translation": "Far from expecting to get everything I want, I fear losing everything."}, {"id": 178, "jlpt_level": "N3", "grammar_point": "どんなに～ても (donna ni ~ temo): no matter how", "sentence": "どんなに素晴らしい商品を作っても、世間に知られなければ価値はないに等しい。", "short_explanation": "Means 'no matter how (much/well) ~, even if ~' to express that regardless of degree, the result is unchanged.", "translation": "No matter how wonderful a product you make, if it is not known to the world, it is as good as worthless."}, {"id": 179, "jlpt_level": "N3", "grammar_point": "ふりをする (furi o suru): to pretend, to act as if", "sentence": "わたしはいつもテレビをつけて、それを見ているふりをしていた。", "short_explanation": "Means 'to pretend' or 'act as if', indicating feigning a state or action.", "translation": "I always turned on the TV and pretended to be watching it."}, {"id": 180, "jlpt_level": "N3", "grammar_point": "がち (gachi): apt to do, tend to do", "sentence": "私のようなベビーブーム世代は、生活を仕事とそれ以外に分けたがり、同僚との付き合いは避けがちです。", "short_explanation": "Indicates a tendency or habit to do something, often negative.", "translation": "People of the baby boom generation like me tend to divide life into work and everything else, and are apt to avoid socializing with colleagues."}, {"id": 181, "jlpt_level": "N3", "grammar_point": "がたい (gatai): hard to, difficult to", "sentence": "彼がそんな質問をするというのは信じがたかった。", "short_explanation": "Indicates that something is difficult or hard to do, often due to emotional or psychological reasons.", "translation": "It was hard to believe that he would ask such a question."}, {"id": 182, "jlpt_level": "N3", "grammar_point": "ぎみ (gimi): -like, -looking", "sentence": "アヤコは、顔は紫色で、日に焼けて、過労気味なのだ。", "short_explanation": "Indicates a slight tendency or state of being somewhat like something, often with negative nuance.", "translation": "Ayako's face is purple, sunburned, and looks somewhat overworked."}, {"id": 183, "jlpt_level": "N3", "grammar_point": "ほど (hodo): the more, to the extent that, so much... that", "sentence": "一生分の旅行を合わせても、パイロットとして過ごす数ヶ月もしくは１年間ほど多くの場所を訪れることは、できないと思います。", "short_explanation": "Indicates extent or degree, often meaning 'to the point that' or 'the more...the more.'", "translation": "I think even if you combined all the travel in a lifetime, you couldn't visit as many places as a pilot does in a few months or a year."}, {"id": 184, "jlpt_level": "N3", "grammar_point": "ほど～ない (hodo ~ nai): is not as... as", "sentence": "その日ほど、彼のそばで仕えているのが誇らしいことはなかった。", "short_explanation": "Indicates that something is not as much as something else; compares two things, showing lesser degree.", "translation": "There was no day when I was as proud to serve by his side as that day."}, {"id": 185, "jlpt_level": "N3", "grammar_point": "いくら～ても (ikura ~ temo): no matter how", "sentence": "私たちがいくら考えごとを頭から追い払おうとしても、体はメッセージを受け取っている。", "short_explanation": "Means 'no matter how much you do X, result Y still happens' or 'even if you do X, Y remains unchanged.'", "translation": "No matter how much we try to drive thoughts out of our heads, our bodies are receiving the message."}, {"id": 186, "jlpt_level": "N3", "grammar_point": "一方だ (ippou da): more and more, continue to", "sentence": "ここには空アパートがたくさんできており、時とともにその数は増える一方だ。", "short_explanation": "Indicates a continuous increase or change in one direction, often negative.", "translation": "There are many empty apartments here, and their number continues to increase over time."}, {"id": 187, "jlpt_level": "N3", "grammar_point": "一方で (ippou de): on one hand, on the other hand", "sentence": "光熱費、人件費、メンテナンス費などが着々と上がる一方で、市は家賃の値上げを禁じた。", "short_explanation": "Used to contrast two opposing facts or situations, meaning 'on one hand... on the other hand'.", "translation": "On one hand, utility costs, labor costs, and maintenance fees are steadily rising, but on the other hand, the city has prohibited rent increases."}, {"id": 188, "jlpt_level": "N3", "grammar_point": "かけ (kake): half-, not yet finished", "sentence": "彼は冷めてしまった食べかけのパイをようやく口に入れた。", "short_explanation": "Indicates an action is incomplete or half-done, often with a sense of something left unfinished.", "translation": "He finally put the half-eaten pie that had gone cold into his mouth."}, {"id": 189, "jlpt_level": "N3", "grammar_point": "から言うと/から言えば/から言って (kara iu to/kara ieba/kara to itte): in terms of, from", "sentence": "世間の認識という点からいえば、私の立場は弱かった。", "short_explanation": "Indicates viewpoint or basis for judgment, meaning 'from the perspective of' or 'judging from'.", "translation": "From the perspective of public perception, my position was weak."}, {"id": 190, "jlpt_level": "N3", "grammar_point": "代わりに (kawari ni): instead of, in exchange for", "sentence": "彼は靴ひもを結ぶかわりに、ポケットから何かを取り出し、床においていた。", "short_explanation": "Indicates doing something instead of or in exchange for another action.", "translation": "Instead of tying his shoelaces, he took something out of his pocket and placed it on the floor."}, {"id": 191, "jlpt_level": "N3", "grammar_point": "っけ (kke): what is... again?", "sentence": "チケットはどうしたかしら？あなたが持っていたんだったっけ、それとも私？", "short_explanation": "Used to confirm or recall something uncertain, like 'was it... again?'", "translation": "What happened to the ticket? Was it you who had it, or me?"}, {"id": 192, "jlpt_level": "N3", "grammar_point": "決して～ない (kesshite ~ nai): never, by no means", "sentence": "もし家庭が民主的ではなかったら、決して民主的な社会は得られません。", "short_explanation": "Used with negative verbs to strongly emphasize 'never' or 'by no means'.", "translation": "If families are not democratic, a democratic society can never be achieved."}, {"id": 193, "jlpt_level": "N3", "grammar_point": "切る (kiru): to do something completely to the end", "sentence": "数年前まであれほど人気をよんでいた町が、突然文字どおり冷え切ってしまった。", "short_explanation": "Expresses doing an action thoroughly or completely to its end, often with intensity or finality.", "translation": "The town that was so popular until a few years ago suddenly became completely cold, literally."}, {"id": 194, "jlpt_level": "N3", "grammar_point": "切れない (kirenai): being too much to finish or complete", "sentence": "わたしの感情はわたし自身の力では律しきれない。", "short_explanation": "Indicates something is too much to complete or handle fully, expressing inability to finish or manage.", "translation": "My emotions cannot be controlled by my own power alone."}, {"id": 195, "jlpt_level": "N3", "grammar_point": "きり (kiri): only, just, since, after", "sentence": "翌朝、彼女はホテルを徒歩で出かけたきり、二度と姿を見せないのです。", "short_explanation": "Indicates that since an action occurred, nothing else has happened or only that action remains.", "translation": "The next morning, she left the hotel on foot and was never seen again."}, {"id": 196, "jlpt_level": "N3", "grammar_point": "こそ (koso): for sure (emphasize preceding word)", "sentence": "これらのことを成し遂げる能力こそ、我々の国力を測るうえできわめて重要な物差しになるはずだ。", "short_explanation": "Emphasizes the preceding word, meaning 'precisely' or 'for sure', highlighting its importance.", "translation": "The ability to accomplish these things should be an extremely important yardstick for measuring our national power."}, {"id": 197, "jlpt_level": "N3", "grammar_point": "こと (koto): (must) do", "sentence": "書類の上でどんなによさそうに見える話でも、自分自身のカンに頼って判断すること。", "short_explanation": "Indicates that one must do something, often implying obligation or necessity based on context.", "translation": "Even if a story looks good on paper, you must judge based on your own intuition."}, {"id": 198, "jlpt_level": "N3", "grammar_point": "ことだ (koto da): should", "sentence": "偏見にとらわれないことだ。わたしたちはみんな、理解していないものを恐れる。", "short_explanation": "Expresses a strong suggestion or advice, meaning 'should' or 'ought to'.", "translation": "You should not be prejudiced. We all fear what we don't understand."}, {"id": 199, "jlpt_level": "N3", "grammar_point": "ことがある (koto ga aru): there are times when", "sentence": "時々、彼女は結婚してキャリアを諦めたことを後悔することがある。", "short_explanation": "Indicates that something happens occasionally or from time to time.", "translation": "Sometimes, she regrets having gotten married and given up her career."}, {"id": 200, "jlpt_level": "N3", "grammar_point": "ことか (koto ka): how...! what...!", "sentence": "あかあかともえる暖炉の明かりとぬくもりを、どんなに欲しいと願ったことか！", "short_explanation": "Expresses strong emotion or emphasis, meaning 'how...!' or 'what...!'", "translation": "How I wished for the bright, blazing light and warmth of a fireplace!"}, {"id": 201, "jlpt_level": "N3", "grammar_point": "ことから (koto kara): from the fact that", "sentence": "彼は父親が有名な作家であることから、範囲から特別な目で見られがちです。", "short_explanation": "Indicates a reason or basis derived from a specific fact or situation.", "translation": "Because his father is a famous writer, he tends to be viewed with special attention from the scope."}, {"id": 202, "jlpt_level": "N3", "grammar_point": "ことに (koto ni): unusually, especially", "sentence": "びっくりすることに、アメリカで今、ソフトウェエンジニアに次いで、２番目に人気の職業は、大学の先生なんだ。", "short_explanation": "Indicates the speaker's emotional reaction to a fact, meaning 'it is (adjective) that...'", "translation": "Surprisingly, the second most popular job in America right now, after software engineer, is university professor."}, {"id": 203, "jlpt_level": "N3", "grammar_point": "ことになる (koto ni naru): it has been decided that", "sentence": "アメリカの多くの若者も、１１月８日に初めて投票することになります。", "short_explanation": "Indicates a decision or conclusion has been reached, often by external circumstances or group consensus.", "translation": "Many young Americans will also be voting for the first time on November 8th."}, {"id": 204, "jlpt_level": "N3", "grammar_point": "ことにする (koto ni suru): to decide on", "sentence": "両親は、無理があってもよくないと一年だけ飛び級させることにした。", "short_explanation": "Expresses a decision to do something, often after consideration.", "translation": "My parents decided to let me skip a grade for just one year, thinking that pushing too hard wouldn't be good."}, {"id": 205, "jlpt_level": "N3", "grammar_point": "ことはない (koto wa nai): there is no need to, never happens", "sentence": "嫉妬することはないよ！ちょっとあなたをからかって、悲しみを軽くしてあげたかったのだ。", "short_explanation": "Indicates that there is no need to do something, or that something never happens.", "translation": "There's no need to be jealous! I just wanted to tease you a little and lighten your sadness."}, {"id": 206, "jlpt_level": "N3", "grammar_point": "くらい (kurai): to the extent that, so... that", "sentence": "この部屋には恐らく、香港を動かしていくことができるぐらいのコンピューティング・パワーがあるでしょう。", "short_explanation": "Indicates an extent or degree, often meaning 'to the point that' or 'so... that'.", "translation": "This room probably has enough computing power to move Hong Kong."}, {"id": 207, "jlpt_level": "N3", "grammar_point": "くせに (kuse ni): even though, and yet, despite", "sentence": "なぜあなたは完全に立派な英語をお話しになることもあるくせに、そうでない時もあるのです？", "short_explanation": "Indicates a contradiction or criticism, meaning 'even though' or 'despite' something being true.", "translation": "Why is it that even though you sometimes speak perfectly good English, there are times when you don't?"}, {"id": 208, "jlpt_level": "N3", "grammar_point": "まま (mama): as it is", "sentence": "彼の若々しい態度は、年を取っても変わらないままだ。", "short_explanation": "Indicates that something remains unchanged or continues in its current state.", "translation": "His youthful attitude remains unchanged even as he gets older."}, {"id": 209, "jlpt_level": "N3", "grammar_point": "まるで (maru de): as if, as though", "sentence": "彼らは急に立ち止まり、まるで木の影のように音もなく立ったまま、耳を傾けた。", "short_explanation": "Indicates something is like or as if something else, often used with figurative comparisons.", "translation": "They suddenly stopped, stood silently like a tree's shadow, and listened."}, {"id": 210, "jlpt_level": "N3", "grammar_point": "めったに～ない (metta ni ~ nai): hardly, rarely, seldom", "sentence": "旅に出るまえの子どもは、あれこれ考えて興奮しているので、食がすすむことはめったにない。", "short_explanation": "Means 'rarely' or 'hardly ever' when paired with a negative verb form.", "translation": "Children before a trip are excited and thinking about this and that, so they rarely have an appetite."}, {"id": 211, "jlpt_level": "N3", "grammar_point": "もの (mono): because (indicate reason or excuse)", "sentence": "あやまることはないよ。君が悪いわけじゃないんだもの。", "short_explanation": "Indicates a reason or excuse, often subjective or emotional, like 'because' or 'it's because'.", "translation": "You don't need to apologize. It's because it's not your fault."}, {"id": 212, "jlpt_level": "N3", "grammar_point":
